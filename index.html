<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EPUB Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════ DESIGN TOKENS ═══ */
:root {
  --bg:       #0e0d0b;
  --surface:  #161512;
  --surf2:    #1e1c19;
  --border:   #2e2b26;
  --text:     #e8e4dc;
  --muted:    #7a7468;
  --accent:   #c9a84c;
  --accent2:  #8fb07a;
  --danger:   #c0614a;
  --r:        8px;
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left,   0px);
  --safe-r: env(safe-area-inset-right,  0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; min-height: 100vh; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r); }

/* ═══ TOPBAR ═══ */
#topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  padding: 8px calc(14px + var(--safe-r)) 8px calc(14px + var(--safe-l));
}
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surf2); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  cursor: pointer; white-space: nowrap; user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, background .2s, color .2s;
}
.btn:hover  { background: var(--border); border-color: var(--accent); }
.btn.lit    { border-color: var(--accent); color: var(--accent); background: #261f0f; }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: #2a1512; }
.sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 1px; }

.file-label {
  display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px;
  border: 1px dashed var(--border); border-radius: var(--r);
  background: var(--surf2); color: var(--muted);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, color .2s;
}
.file-label:hover { border-color: var(--accent); color: var(--accent); }
input[type="file"] { display: none; }

#bookTitle {
  flex: 1; min-width: 0;
  font-family: 'Lora', serif; font-size: 13px;
  color: var(--muted); font-style: italic;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 0 6px;
}
#topWordCount {
  margin-left: auto; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--muted); white-space: nowrap;
  padding: 6px 11px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surf2); min-width: 130px; text-align: right;
  transition: color .3s, border-color .3s;
}
/* Accende il contatore in verde quando mancano poche parole */
#topWordCount.near-end { color: var(--accent2); border-color: var(--accent2); }

/* ═══ STATUS BAR ═══ */
#statusBar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 4px calc(14px + var(--safe-r)) 4px calc(14px + var(--safe-l));
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
  min-height: 26px;
}
#statusMsg { color: var(--accent2); display: flex; align-items: center; gap: 6px; }

/* Spinner per elaborazione in background */
.spinner {
  width: 9px; height: 9px;
  border: 1.5px solid var(--accent2); border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite; display: none;
}
.spinner.on { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

#progressBar { width: 100%; height: 2px; background: var(--border); }
#progressFill { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; }

/* ═══ CONTROLS ═══ */
#controls {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 6px calc(14px + var(--safe-r)) 6px calc(14px + var(--safe-l));
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; flex-wrap: wrap;
}
.stat-row {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.stat-row span { color: var(--text); }

/* ═══ NAV BAR ═══ */
.nav-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px calc(14px + var(--safe-r)) 6px calc(14px + var(--safe-l));
  background: var(--surface); border-bottom: 1px solid var(--border);
  gap: 8px;
}
.nav-btn {
  flex: 1; max-width: 140px; padding: 8px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surf2); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, background .2s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--border); }
.nav-btn:disabled { opacity: .3; cursor: default; }
#chapterLabel {
  flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
  padding: 0 4px;
}

/* ═══ CONTENT ═══ */
#contentWrap {
  max-width: 720px; margin: 0 auto;
  padding: 36px calc(22px + var(--safe-r)) calc(72px + var(--safe-b)) calc(22px + var(--safe-l));
}
#content { font-size: 18px; line-height: 1.8; color: var(--text); }

/*
  NOTA EDGE READ ALOUD:
  NON usare !important su color/background.
  Edge inietta <span> con stili inline per evidenziare la parola letta:
  !important li renderebbe invisibili.
*/
#content * { max-width: 100%; }
#content p, #content div, #content span,
#content li, #content td, #content th,
#content blockquote, #content cite {
  font-family: 'Lora', Georgia, serif;
  color: var(--text); background: transparent;
}
#content b, #content strong { font-weight: 600; }
#content i, #content em     { font-style: italic; }
#content img  { display: block; margin: 28px auto; border-radius: 4px; opacity: .9; height: auto; }
#content svg  { display: block; margin: 28px auto; max-width: 100%; height: auto; }
#content h1, #content h2, #content h3,
#content h4, #content h5, #content h6 {
  font-family: 'Lora', Georgia, serif;
  color: var(--accent); background: transparent;
  margin: 2em 0 .6em; line-height: 1.3;
}
#content p       { margin-bottom: 1.1em; }
#content ul, #content ol { margin: 1em 0 1em 1.5em; }
#content li      { margin-bottom: .4em; }
#content blockquote {
  margin: 1.5em 0; padding: .75em 1em;
  border-left: 3px solid var(--accent); color: var(--muted);
}
#content table   { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: .9em; }
#content td, #content th { border: 1px solid var(--border); padding: 6px 10px; }
#content th      { color: var(--accent); background: var(--surf2); }
#content a       { color: var(--accent2); text-decoration-color: transparent; transition: text-decoration-color .2s; }
#content a:hover { text-decoration-color: var(--accent2); }

/* Scroll offset per sticky header + Edge Read Aloud */
html { scroll-padding-top: 130px; }
#content p, #content span, #content div,
#content h1, #content h2, #content h3, #content h4 { scroll-margin-top: 130px; }

/* ═══ DRAWERS — pattern condiviso ═══ */
/*
  FIX originale: display:none bloccava le transizioni CSS.
  Soluzione: visibility + pointer-events con ritardo al nascondimento.
*/
.drawer {
  position: fixed; inset: 0; z-index: 300;
  pointer-events: none; visibility: hidden;
  transition: visibility 0s linear .3s;
}
.drawer.open {
  pointer-events: all; visibility: visible;
  transition: visibility 0s linear 0s;
}
.dbackdrop {
  position: absolute; inset: 0;
  background: #000000b0; backdrop-filter: blur(4px);
  opacity: 0; transition: opacity .3s ease;
}
.drawer.open .dbackdrop { opacity: 1; }

/* TOC — da destra */
#tocPanel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(380px, 92vw);
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .3s ease;
}
#tocDrawer.open #tocPanel { transform: translateX(0); }

/* LIBRARY — da sinistra */
#libPanel {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: min(400px, 96vw);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform .3s ease;
}
#libDrawer.open #libPanel { transform: translateX(0); }

.drawer-hdr {
  padding: 13px 15px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
  flex-shrink: 0;
}
.drawer-body { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }

/* TOC tab filter */
.toc-tabs { display: flex; gap: 4px; padding: 8px 8px 0; flex-shrink: 0; }
.ttab {
  flex: 1; padding: 5px 4px;
  border: 1px solid var(--border);
  border-radius: var(--r) var(--r) 0 0; border-bottom: none;
  background: var(--surf2); color: var(--muted);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  cursor: pointer; text-align: center; transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.ttab.on { background: var(--surface); color: var(--accent); border-color: var(--accent); }

/* TOC items */
.toc-item {
  width: 100%; text-align: left; padding: 9px 10px;
  border: none; border-radius: var(--r);
  background: transparent; color: var(--text);
  font-family: 'Lora', serif; font-size: 13px;
  cursor: pointer; display: flex; align-items: baseline; gap: 5px;
  transition: background .15s; border-bottom: 1px solid var(--border);
  -webkit-tap-highlight-color: transparent;
}
.toc-item:hover  { background: var(--surf2); }
.toc-item.active { color: var(--accent); }
.toc-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toc-words { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }
.toc-star  { color: var(--accent); font-size: 11px; flex-shrink: 0; }
.drawer-empty {
  padding: 28px 16px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
}

/* Library items */
.lib-item {
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 11px 12px; margin-bottom: 8px;
  background: var(--surf2); transition: border-color .15s; position: relative;
}
.lib-item:hover { border-color: var(--muted); }
.lib-item.cur   { border-color: var(--accent); }

.lib-cover {
  float: left; margin-right: 10px;
  width: 46px; height: 64px;
  border-radius: 3px; border: 1px solid var(--border);
  background: var(--surface); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
/*
  FIX IMMAGINI LIBRERIA:
  Le cover sono data URL già in memoria — nessun costo di rete.
  NON usare loading="lazy": dentro visibility:hidden il browser
  non le considera "in viewport" e non le carica mai.
  Con loading="eager" vengono decodificate appena il tag viene inserito.
*/
.lib-cover img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 2px;
  /* eager è il default per img, ma lo esplicitiamo per chiarezza */
}

.lib-title { font-family: 'Lora', serif; font-size: 14px; color: var(--text); margin-bottom: 3px; padding-right: 30px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-meta  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 7px; clear: left; }
.lib-bar   { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 8px; }
.lib-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width .4s; }
.lib-actions { display: flex; align-items: center; gap: 6px; }
.lib-pct     { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-left: 4px; }
.lib-del {
  position: absolute; top: 8px; right: 8px;
  padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px;
  background: transparent; color: var(--muted); font-size: 11px; cursor: pointer;
  transition: color .15s, border-color .15s; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.lib-del:hover { color: var(--danger); border-color: var(--danger); }
#libEmpty { padding: 40px 16px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
#libEmpty .big { font-size: 36px; opacity: .25; display: block; margin-bottom: 8px; }

/* Empty state */
#emptyState {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 10px;
  color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: center;
}
#emptyState .big { font-size: 46px; opacity: .25; }

/* Loading toast — angolo inferiore destro, non copre i pulsanti */
#loadToast {
  display: none; position: fixed;
  bottom: calc(20px + var(--safe-b)); right: calc(20px + var(--safe-r));
  z-index: 150;
  background: var(--surface); border: 1px solid var(--accent); border-radius: var(--r);
  padding: 8px 13px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
  box-shadow: 0 4px 16px #0009;
  animation: fadein .2s ease; align-items: center; gap: 8px;
}
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
.toast-spin {
  width: 9px; height: 9px;
  border: 1.5px solid var(--accent); border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

@media (max-width: 600px) {
  #contentWrap { padding: 20px 14px 56px; }
  .btn { padding: 7px 9px; }
  .nav-btn { font-size: 11px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; }
}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<header id="topbar" role="banner">

  <button class="btn" onclick="toggleLibrary()" aria-label="Libreria" aria-haspopup="dialog">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Libreria
  </button>

  <label class="file-label" for="fileInput" aria-label="Apri file EPUB">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    Apri EPUB
  </label>
  <input type="file" id="fileInput" accept=".epub" aria-label="Seleziona EPUB">

  <div class="sep"></div>

  <button class="btn" id="btnBm" onclick="toggleBookmark()" aria-label="Segnalibro" title="Segnalibro (B)">
    <svg id="bmIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    <span id="bmLabel">Segna</span>
  </button>

  <button class="btn" id="btnToc" onclick="toggleToc()" aria-label="Indice capitoli" aria-haspopup="dialog">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Indice
  </button>

  <div class="sep"></div>

  <div role="group" aria-label="Testo" style="display:flex;gap:4px">
    <button class="btn" onclick="changeFont(-1)" aria-label="Font più piccolo">A−</button>
    <button class="btn" onclick="changeFont(1)"  aria-label="Font più grande">A+</button>
    <button class="btn" onclick="changeLine(-0.1)" aria-label="Interlinea minore">↕−</button>
    <button class="btn" onclick="changeLine(0.1)"  aria-label="Interlinea maggiore">↕+</button>
  </div>

  <div class="sep"></div>

  <button class="btn danger" onclick="resetBook()" aria-label="Chiudi libro corrente" title="Chiudi libro">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
  </button>

  <span id="bookTitle" aria-live="polite">Nessun libro caricato</span>
  <div id="topWordCount" aria-live="polite" aria-label="Parole rimanenti nel capitolo">— p.</div>

</header>

<!-- STATUS -->
<div id="statusBar" role="status" aria-live="polite">
  <span id="statusMsg"><span class="spinner" id="bgSpin"></span>Pronto</span>
  <span id="statsRight">—</span>
</div>
<div id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progresso lettura">
  <div id="progressFill"></div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="stat-row" aria-live="polite">
    <span>Cap. <span id="sChap">—</span></span>
    <span>Parole <span id="sChapW">—</span></span>
    <span>Totale <span id="sTot">—</span></span>
  </div>
</div>

<!-- NAV TOP -->
<nav class="nav-bar" aria-label="Navigazione capitoli">
  <button class="nav-btn" id="btnPrevTop" onclick="prev()" disabled aria-label="Capitolo precedente">← Prec.</button>
  <span id="chapterLabel" aria-live="polite">—</span>
  <button class="nav-btn" id="btnNextTop" onclick="next()" disabled aria-label="Capitolo successivo">Succ. →</button>
</nav>

<!-- CONTENT -->
<div id="contentWrap">
  <main id="content" lang="it" role="main" tabindex="-1">
    <div id="emptyState">
      <div class="big" aria-hidden="true">📖</div>
      <div>Apri un file EPUB per iniziare</div>
      <div style="color:var(--border);font-size:10px;margin-top:6px">Salvato localmente · funziona offline</div>
      <div style="color:var(--border);font-size:10px">← → per navigare · B per segnalibro</div>
    </div>
  </main>
</div>

<!-- NAV BOTTOM -->
<nav class="nav-bar" aria-label="Navigazione capitoli (basso)">
  <button class="nav-btn" id="btnPrevBot" onclick="prev()" disabled aria-label="Capitolo precedente">← Prec.</button>
  <span></span>
  <button class="nav-btn" id="btnNextBot" onclick="next()" disabled aria-label="Capitolo successivo">Succ. →</button>
</nav>

<!-- LOADING TOAST -->
<div id="loadToast" role="status" aria-live="assertive">
  <span class="toast-spin"></span>
  <span id="loadMsg">Caricamento…</span>
</div>

<!-- TOC DRAWER (destra) -->
<div id="tocDrawer" class="drawer" role="dialog" aria-modal="true" aria-label="Indice capitoli">
  <div class="dbackdrop" onclick="toggleToc()" aria-hidden="true"></div>
  <div id="tocPanel">
    <div class="drawer-hdr">
      <span>INDICE</span>
      <button class="btn" onclick="toggleToc()" aria-label="Chiudi">✕</button>
    </div>
    <div class="toc-tabs" role="tablist" aria-label="Filtra capitoli">
      <button class="ttab on" id="tabAll" role="tab" aria-selected="true"  onclick="setTocFilter('all')">Tutti</button>
      <button class="ttab"    id="tabBm"  role="tab" aria-selected="false" onclick="setTocFilter('bm')">★ Segnalibri</button>
    </div>
    <div class="drawer-body" id="tocList" role="list"></div>
  </div>
</div>

<!-- LIBRARY DRAWER (sinistra) -->
<div id="libDrawer" class="drawer" role="dialog" aria-modal="true" aria-label="Libreria">
  <div class="dbackdrop" onclick="toggleLibrary()" aria-hidden="true"></div>
  <div id="libPanel">
    <div class="drawer-hdr">
      <span>LIBRERIA</span>
      <button class="btn" onclick="toggleLibrary()" aria-label="Chiudi">✕</button>
    </div>
    <div class="drawer-body" id="libList"></div>
  </div>
</div>


<script>
/* ═══════════════════════════════════════════════════════════
   STATO GLOBALE
   ═══════════════════════════════════════════════════════════ */
let db            = null;
let chapters      = [];    // [{title, rawHtml, html, href, baseDir}]
let chapterWords  = [];    // parole per capitolo
let totalWords    = 0;
let current       = 0;
let bookLang      = "it";
let fileToChap    = {};    // filename → chapter index (link interni)
let currentBookId = null;
let bookmarks     = {};    // {chapterIdx: true}
let zipRef        = null;  // JSZip in memoria — disponibile solo nella sessione corrente
let imgDone       = [];    // [bool] immagini già elaborate per capitolo
let tocFilter     = "all"; // "all" | "bm"

/*
  CONTEGGIO PAROLE — IntersectionObserver con readSet (WeakMap).

  Approccio:
  - Ogni elemento testo (p, li, h1…) è osservato.
  - Quando ESCE dal viewport verso l'alto (top < 0) → è stato letto → entra in readSet.
  - Quando rientra nel viewport → ancora da leggere → esce da readSet.
  - "Parole rimanenti" = totalObsWords - somma parole in readSet.

  Questo gestisce correttamente ENTRAMBE le direzioni di scroll.
  A differenza di unobserve() (che bloccava il decremento sullo scroll-su),
  qui gli elementi rimangono osservati per tutta la vita del capitolo.
*/
let wordObs         = null;
const elemWordMap   = new WeakMap(); // el → numero parole
const readSet       = new Set();     // elementi "sopra la piega" = già letti
let   totalObsWords = 0;

// Debounce salvataggio scroll
let scrollTimer = null;

let fontSize   = parseInt(localStorage.getItem("fs"))  || 18;
let lineHeight = parseFloat(localStorage.getItem("lh")) || 1.8;

const DEBUG = new URLSearchParams(location.search).has("debug");
const log   = DEBUG ? (...a) => console.log("[EPUB]", ...a) : () => {};


/* ═══════════════════════════════════════════════════════════
   UTILITÀ
   ═══════════════════════════════════════════════════════════ */

/** Risolve un path relativo href rispetto alla directory base. Gestisce ../, ./, /. */
function resolvePath(base, href) {
  if (!href) return "";
  if (href.startsWith("data:") || /^https?:\/\//.test(href)) return href;
  if (href.startsWith("/")) return href.slice(1);
  const parts = (base + href).split("/");
  const out = [];
  for (const p of parts) {
    if (p === "..") out.pop();
    else if (p !== ".") out.push(p);
  }
  return out.join("/");
}

/** Cerca file in ZIP in modo case-insensitive (robusto per EPUB prodotti su Windows). */
function zipFind(zip, path) {
  return zip.file(path)
    || zip.file(path.replace(/^\//, ""))
    || (() => {
      const low = path.toLowerCase();
      const k   = Object.keys(zip.files).find(f => f.toLowerCase() === low);
      return k ? zip.file(k) : null;
    })();
}

/** MIME type da estensione file. */
function mimeOf(path) {
  const ext = (path.split(".").pop() || "").toLowerCase();
  return { jpg:"image/jpeg", jpeg:"image/jpeg", png:"image/png",
           gif:"image/gif",  svg:"image/svg+xml", webp:"image/webp",
           bmp:"image/bmp",  avif:"image/avif" }[ext] || "image/jpeg";
}

/** Conta le parole in testo grezzo (normalizza whitespace). */
function countWords(text) {
  return (text || "").replace(/[\r\n\t]+/g, " ").trim().split(/\s+/).filter(Boolean).length;
}

/** Cede il controllo al browser tra operazioni pesanti (evita UI freeze). */
const yield_ = () => new Promise(r => setTimeout(r, 0));

/** Genera un ID univoco per un libro da titolo + timestamp. */
function makeBookId(title) {
  const s = (title || "book").toLowerCase().replace(/[^a-z0-9]+/g, "_").substring(0, 28);
  return `bk_${s}_${Date.now()}`;
}


/* ═══════════════════════════════════════════════════════════
   INDEXEDDB  (nome "EPUB_RDR" per evitare conflitti con versioni precedenti)

   Schema chiavi:
     lib_index              [{id, title, chapterCount, totalWords, date, lastChap, pct, coverDataUrl}]
     lib_last               id dell'ultimo libro aperto
     ${id}_meta             {title, chapterCount, totalWords, bookLang, fileToChap, bookmarks, chapterWords}
     ${id}_ch_${i}          {title, html, href}  — html con immagini già embed
     ${id}_last             number (ultimo capitolo visitato)   ← FIX: chiave dedicata, sempre aggiornata
     ${id}_scroll_${i}      number (scrollY del capitolo i)
   ═══════════════════════════════════════════════════════════ */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("EPUB_RDR", 1);
    req.onupgradeneeded = e => {
      if (!e.target.result.objectStoreNames.contains("kv"))
        e.target.result.createObjectStore("kv");
    };
    req.onsuccess = e => {
      db = e.target.result;
      db.onversionchange = () => db.close();
      resolve();
    };
    req.onerror   = () => reject(new Error("IndexedDB: " + req.error));
    req.onblocked = () => reject(new Error("IndexedDB bloccato"));
  });
}

const dbSet = (k, v) => new Promise((res, rej) => {
  try {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(v, k);
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  } catch(e) { rej(e); }
});

const dbGet = (k) => new Promise((res, rej) => {
  try {
    const tx  = db.transaction("kv", "readonly");
    const req = tx.objectStore("kv").get(k);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  } catch(e) { rej(e); }
});

const dbDel = (k) => new Promise((res, rej) => {
  try {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").delete(k);
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  } catch(e) { rej(e); }
});

/** Salvataggio silenzioso — non lancia mai (usato per scroll, lastChap, ecc.). */
const dbQ = async (k, v) => { try { if (db) await dbSet(k, v); } catch(_) {} };


/* ═══════════════════════════════════════════════════════════
   LIBRERIA  — gestione multi-libro
   ═══════════════════════════════════════════════════════════ */
async function getLibIndex() { return (await dbGet("lib_index")) || []; }
async function setLibIndex(idx) { await dbQ("lib_index", idx); }

/** Salva/aggiorna metadati e indice libreria. */
async function saveBookMeta() {
  if (!currentBookId || !chapters.length) return;
  try {
    const read = chapterWords.slice(0, current + 1).reduce((a, b) => a + b, 0);
    const pct  = totalWords ? Math.round((read / totalWords) * 100) : 0;
    const title = document.getElementById("bookTitle").textContent;

    await dbSet(currentBookId + "_meta", {
      title, chapterCount: chapters.length, totalWords,
      bookLang, fileToChap, bookmarks, chapterWords
    });

    const idx   = await getLibIndex();
    const pos   = idx.findIndex(b => b.id === currentBookId);
    const entry = {
      id: currentBookId, title, chapterCount: chapters.length,
      totalWords, date: Date.now(), lastChap: current, pct,
      coverDataUrl: pos >= 0 ? (idx[pos].coverDataUrl || "") : ""
    };
    if (pos >= 0) idx[pos] = { ...idx[pos], ...entry }; else idx.unshift(entry);
    await setLibIndex(idx);
  } catch(e) { log("saveBookMeta:", e); }
}

/** Salva un singolo capitolo elaborato. */
async function saveChap(bookId, i) {
  const ch = chapters[i];
  if (!db || !ch) return;
  await dbQ(bookId + "_ch_" + i, { title: ch.title, html: ch.html || ch.rawHtml, href: ch.href });
}

/**
 * Carica un libro dalla libreria e lo visualizza.
 *
 * FIX ULTIMO CAPITOLO:
 * Legge dalla chiave dedicata "${id}_last" (aggiornata ad ogni cambio capitolo
 * in show()) invece di meta.lastChap (aggiornata solo alla fine del background
 * processing). Le due informazioni sono ora coerenti.
 */
async function loadBook(id) {
  showLoad("Caricamento…");
  try {
    const meta = await dbGet(id + "_meta");
    if (!meta) { setStatus("Metadati libro non trovati"); return; }

    if (wordObs) { wordObs.disconnect(); wordObs = null; }
    readSet.clear();
    zipRef       = null;
    bookmarks    = meta.bookmarks    || {};
    fileToChap   = meta.fileToChap   || {};
    bookLang     = meta.bookLang     || "it";
    chapterWords = meta.chapterWords || [];
    totalWords   = meta.totalWords   || 0;
    currentBookId = id;

    // Carica tutti i capitoli in parallelo
    const loaded = await Promise.all(
      Array.from({ length: meta.chapterCount }, (_, i) => dbGet(id + "_ch_" + i))
    );
    chapters = loaded.map(ch => ch
      ? { title: ch.title, rawHtml: ch.html, html: ch.html, href: ch.href, baseDir: "" }
      : null
    ).filter(Boolean);
    imgDone = new Array(chapters.length).fill(true);

    document.getElementById("bookTitle").textContent = meta.title;
    await dbQ("lib_last", id);

    renderToc();

    /*
      FIX ULTIMO CAPITOLO:
      Priorità di lettura: chiave dedicata "_last" (aggiornata sempre) > meta.lastChap.
      La chiave "_last" viene scritta ad ogni cambio capitolo in show().
      meta.lastChap è solo un fallback per libri salvati con versioni precedenti.
    */
    const savedLast = await dbGet(id + "_last");
    const lastChap  = (savedLast != null) ? savedLast : (meta.lastChap || 0);
    const safeChap  = Math.min(lastChap, chapters.length - 1);

    await show(safeChap);
    if (document.getElementById("libDrawer").classList.contains("open")) toggleLibrary();
    setStatus(`${meta.title} — ${chapters.length} capitoli`);
    log("Libro caricato dalla libreria:", id, "ultimo cap:", safeChap);
  } catch(e) {
    setStatus("Errore: " + e.message); console.error(e);
  } finally { hideLoad(); }
}

/** Elimina un libro e tutte le sue chiavi dal DB. */
async function deleteBook(id, count) {
  if (!confirm("Eliminare definitivamente questo libro?")) return;
  try {
    for (let i = 0; i < count; i++) {
      await dbDel(id + "_ch_" + i);
      await dbDel(id + "_scroll_" + i);
    }
    await dbDel(id + "_meta");
    await dbDel(id + "_last");
    const idx = (await getLibIndex()).filter(b => b.id !== id);
    await setLibIndex(idx);

    if (currentBookId === id) {
      currentBookId = null;
      chapters = []; chapterWords = []; totalWords = 0;
      current  = 0;  bookmarks    = {}; fileToChap = {};
      document.getElementById("bookTitle").textContent = "Nessun libro caricato";
      document.getElementById("content").innerHTML = emptyStateHTML();
      resetUI();
    }
    await renderLibrary();
    setStatus("Libro eliminato");
  } catch(e) { setStatus("Errore eliminazione: " + e.message); }
}

/**
 * Renderizza la lista libri nel drawer.
 *
 * FIX IMMAGINI LIBRERIA:
 * Le cover sono data URL già in memoria RAM.
 * Non usare loading="lazy" su img dentro visibility:hidden:
 * il browser non le considera "nel viewport" e non le carica mai.
 * Soluzione: img senza attributo loading (default = eager).
 */
async function renderLibrary() {
  const list = document.getElementById("libList");
  list.innerHTML = "";
  const idx = await getLibIndex();

  if (!idx.length) {
    list.innerHTML = `<div id="libEmpty"><span class="big">📚</span>Nessun libro salvato<br>
      <small style="font-size:9px;opacity:.7;display:block;margin-top:4px">Apri un EPUB per aggiungerlo</small></div>`;
    return;
  }

  idx.forEach(b => {
    const active = b.id === currentBookId;
    const d      = new Date(b.date).toLocaleDateString("it-IT", { day:"numeric", month:"short", year:"numeric" });
    const el     = document.createElement("div");
    el.className = "lib-item" + (active ? " cur" : "");

    // Cover: img senza loading="lazy" → eager di default → carica subito anche da visibility:hidden
    let coverHtml;
    if (b.coverDataUrl) {
      coverHtml = `<div class="lib-cover"><img src="${b.coverDataUrl}" alt="Copertina"></div>`;
    } else {
      coverHtml = `<div class="lib-cover">${bookCoverEmoji(b.title)}</div>`;
    }

    el.innerHTML = `
      ${coverHtml}
      <div class="lib-title">${b.title}</div>
      <div class="lib-meta">${b.chapterCount} cap · ${(b.totalWords||0).toLocaleString()} p · ${d}</div>
      <div class="lib-bar"><div class="lib-bar-fill" style="width:${b.pct||0}%"></div></div>
      <div class="lib-actions">
        <button class="btn ${active?"lit":""}" onclick="loadBook('${b.id}')">${active?"✓ Aperto":"Apri"}</button>
        <span class="lib-pct">${b.pct||0}% · cap.${(b.lastChap||0)+1}</span>
      </div>
      <button class="lib-del" onclick="deleteBook('${b.id}',${b.chapterCount})" aria-label="Elimina">🗑</button>`;
    list.appendChild(el);
  });
}

/** Emoji copertina deterministica basata sul titolo (fallback senza cover). */
function bookCoverEmoji(title) {
  const emojis = ["📖","📗","📘","📙","📕","📚","🔖","✍️","🖊️","📝"];
  let hash = 0;
  for (const ch of title) hash = (hash * 31 + ch.charCodeAt(0)) & 0xFFFFFFFF;
  return emojis[Math.abs(hash) % emojis.length];
}


/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
(async () => {
  try { await openDB(); }
  catch(e) { setStatus("DB non disponibile: " + e.message); console.error(e); }

  applyStyle();

  // Navigazione tastiera: ← → / PageUp PageDown / B per bookmark
  document.addEventListener("keydown", e => {
    const tag = document.activeElement?.tagName;
    if (tag === "INPUT" || tag === "BUTTON" || tag === "TEXTAREA") return;
    if (e.key === "ArrowRight" || e.key === "PageDown") { e.preventDefault(); next(); }
    if (e.key === "ArrowLeft"  || e.key === "PageUp")   { e.preventDefault(); prev(); }
    if (e.key === "b" || e.key === "B")                 toggleBookmark();
  });

  // Escape chiude i drawer
  document.addEventListener("keydown", e => {
    if (e.key !== "Escape") return;
    if (document.getElementById("tocDrawer").classList.contains("open")) toggleToc();
    if (document.getElementById("libDrawer").classList.contains("open")) toggleLibrary();
  });

  if (!db) return;

  // Ripristina ultimo libro aperto
  try {
    const lastId = await dbGet("lib_last");
    if (lastId) {
      const meta = await dbGet(lastId + "_meta");
      if (meta) { await loadBook(lastId); return; }
    }
  } catch(e) { log("Restore error:", e); }
})();


/* ═══════════════════════════════════════════════════════════
   FILE INPUT
   ═══════════════════════════════════════════════════════════ */
document.getElementById("fileInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  showLoad("Analisi EPUB…");
  setStatus("Analisi in corso…");
  try { await processEpub(await file.arrayBuffer(), file.name); }
  catch(err) { setStatus("Errore: " + err.message); console.error(err); hideLoad(); }
});


/* ═══════════════════════════════════════════════════════════
   SANITIZZAZIONE HTML EPUB
   Rimuove script, stili inline critici, event handlers.
   Preserva grassetto, italico, titoli, paragrafi, tabelle.
   ═══════════════════════════════════════════════════════════ */
function sanitizeDoc(doc) {
  ["script","style","meta","link","iframe","object","embed","form","input","noscript"]
    .forEach(t => doc.querySelectorAll(t).forEach(el => el.remove()));

  doc.querySelectorAll("*").forEach(el => {
    // Event handlers inline
    [...el.attributes].filter(a => a.name.startsWith("on")).forEach(a => el.removeAttribute(a.name));
    // Colori/sfondi inline che romperebbero il dark mode
    // NON !important: Edge Read Aloud inietta span con stili inline
    if (el.style?.length > 0) {
      el.style.removeProperty("color");
      el.style.removeProperty("background");
      el.style.removeProperty("background-color");
      el.style.removeProperty("font-family");
      // Mantieni: font-size, font-weight, font-style (corsivo/grassetto del libro)
    }
  });
}


/* ═══════════════════════════════════════════════════════════
   ELABORAZIONE IMMAGINI
   Converte src relativi in data URI base64.
   Gestisce tutti i formati + SVG + xlink:href.
   ═══════════════════════════════════════════════════════════ */
async function fixImages(doc, zip, baseDir) {
  for (const img of [...doc.querySelectorAll("img, image")]) {
    const isSvgImg = img.tagName.toLowerCase() === "image";
    const attr     = isSvgImg ? "href" : "src";
    const src      = img.getAttribute(attr) || img.getAttribute("xlink:href") || "";
    if (!src || src.startsWith("data:") || /^https?:\/\//.test(src)) continue;

    const resolved = resolvePath(baseDir, src);
    const zf       = zipFind(zip, resolved);
    if (!zf) { log("Img non trovata:", src, "→", resolved); continue; }
    try {
      const dataUrl = `data:${mimeOf(zf.name)};base64,${await zf.async("base64")}`;
      img.setAttribute(attr, dataUrl);
      if (img.hasAttribute("xlink:href")) img.setAttribute("xlink:href", dataUrl);
    } catch(e) { log("Img error:", resolved, e); }
  }
}

/** Elabora le immagini di un singolo capitolo (richiede zipRef disponibile). */
async function processChapImages(i) {
  if (imgDone[i]) return;
  const ch = chapters[i];
  if (!ch) { imgDone[i] = true; return; }
  const doc = new DOMParser().parseFromString(ch.rawHtml || "", "text/html");
  sanitizeDoc(doc);
  if (zipRef) await fixImages(doc, zipRef, ch.baseDir);
  ch.html    = doc.body.innerHTML;
  imgDone[i] = true;
}

/**
 * Elabora i capitoli rimanenti in background, cedendo il controllo tra l'uno e l'altro.
 * Salva ogni capitolo nel DB non appena è pronto.
 */
async function processBackground(startIdx) {
  const spin = document.getElementById("bgSpin");
  spin.classList.add("on");
  for (let i = startIdx; i < chapters.length; i++) {
    await processChapImages(i);
    await saveChap(currentBookId, i);
    setStatus(`Elaborazione ${i + 1}/${chapters.length}…`);
    await yield_();
  }
  spin.classList.remove("on");
  await saveBookMeta();
  await renderLibrary();
  setStatus(`Libro pronto — ${chapters.length} capitoli · ${totalWords.toLocaleString()} parole`);
  log("Background processing completato");
}


/* ═══════════════════════════════════════════════════════════
   TOC PARSING  (EPUB3 nav.xhtml + EPUB2 toc.ncx)
   Restituisce mappa idref → titolo.
   Usa getElementsByTagName per ignorare namespace OPF non standard.
   ═══════════════════════════════════════════════════════════ */
async function parseTocTitles(opf, zip, base, manifest) {
  const parser = new DOMParser();
  const map    = {};

  function matchHref(href) {
    const plain = href.split("/").pop();
    for (const [id, info] of Object.entries(manifest)) {
      const mh = info.href || "";
      if (mh === href || mh.split("/").pop() === plain) return id;
    }
    return null;
  }

  /* EPUB3: nav.xhtml */
  const navEl = [...opf.getElementsByTagName("item")].find(i =>
    (i.getAttribute("properties") || "").includes("nav") ||
    ((i.getAttribute("href") || "").toLowerCase().includes("nav") &&
     (i.getAttribute("media-type") || "").includes("html"))
  );
  if (navEl) {
    const navFile = zipFind(zip, resolvePath(base, navEl.getAttribute("href")));
    if (navFile) {
      try {
        const navDoc = parser.parseFromString(await navFile.async("text"), "text/html");
        const navEl2 = navDoc.querySelector("nav[epub\\:type='toc']") || navDoc.querySelector("nav");
        if (navEl2) {
          navEl2.querySelectorAll("a").forEach(a => {
            const label = a.textContent.trim();
            const href  = (a.getAttribute("href") || "").split("#")[0];
            if (label && href) { const id = matchHref(href); if (id) map[id] = label; }
          });
        }
        if (Object.keys(map).length) { log("TOC nav.xhtml:", Object.keys(map).length); return map; }
      } catch(e) { log("nav.xhtml:", e); }
    }
  }

  /* EPUB2: toc.ncx */
  const ncxEl = [...opf.getElementsByTagName("item")].find(i =>
    (i.getAttribute("media-type") || "").includes("ncx") ||
    (i.getAttribute("href") || "").toLowerCase().endsWith(".ncx")
  );
  if (ncxEl) {
    const ncxFile = zipFind(zip, resolvePath(base, ncxEl.getAttribute("href")));
    if (ncxFile) {
      try {
        const ncx = parser.parseFromString(await ncxFile.async("text"), "application/xml");
        ncx.querySelectorAll("navPoint").forEach(np => {
          const label = np.querySelector("navLabel text")?.textContent?.trim();
          const src   = np.querySelector("content")?.getAttribute("src")?.split("#")[0];
          if (label && src) { const id = matchHref(src); if (id) map[id] = label; }
        });
        log("TOC ncx:", Object.keys(map).length);
      } catch(e) { log("ncx:", e); }
    }
  }
  return map;
}


/* ═══════════════════════════════════════════════════════════
   EPUB PARSER PRINCIPALE
   ═══════════════════════════════════════════════════════════ */
async function processEpub(buffer, filename) {
  zipRef = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  /* container.xml → OPF path */
  const cf = zipFind(zipRef, "META-INF/container.xml");
  if (!cf) throw new Error("container.xml non trovato — EPUB non valido");
  const cxml     = parser.parseFromString(await cf.async("text"), "application/xml");
  const rootPath = cxml.querySelector("rootfile")?.getAttribute("full-path");
  if (!rootPath) throw new Error("OPF path non trovato in container.xml");

  const opfFile = zipFind(zipRef, rootPath);
  if (!opfFile) throw new Error("OPF non trovato: " + rootPath);

  const opf  = parser.parseFromString(await opfFile.async("text"), "application/xml");
  const base = rootPath.substring(0, rootPath.lastIndexOf("/") + 1);
  log("OPF base:", base);

  /* Lingua */
  bookLang = opf.querySelector("language")?.textContent?.trim()
          || opf.getElementsByTagName("dc:language")[0]?.textContent?.trim()
          || "it";

  /* Titolo */
  const opfTitle = opf.querySelector("title")?.textContent?.trim()
                || opf.getElementsByTagName("dc:title")[0]?.textContent?.trim()
                || filename.replace(/\.epub$/i, "");

  /* Manifest: id → {href, mediaType} */
  const manifest = {};
  [...opf.getElementsByTagName("item")].forEach(i => {
    const id = i.getAttribute("id"), href = i.getAttribute("href");
    if (id && href) manifest[id] = { href, mediaType: i.getAttribute("media-type") || "" };
  });

  /* Spine */
  const spineIds = [...opf.getElementsByTagName("itemref")]
    .map(i => i.getAttribute("idref")).filter(Boolean);
  log("Spine:", spineIds.length);

  /* Copertina */
  let coverDataUrl = "";
  const coverItem = [...opf.getElementsByTagName("item")].find(i =>
    (i.getAttribute("properties") || "").includes("cover-image") ||
    (i.getAttribute("id") || "").toLowerCase().includes("cover")
  );
  if (coverItem) {
    const coverFile = zipFind(zipRef, resolvePath(base, coverItem.getAttribute("href") || ""));
    if (coverFile) {
      try {
        coverDataUrl = `data:${mimeOf(coverFile.name)};base64,${await coverFile.async("base64")}`;
        log("Cover trovata");
      } catch(e) { log("Cover error:", e); }
    }
  }

  /* TOC */
  const titleMap = await parseTocTitles(opf, zipRef, base, manifest);

  /* ID libro: riusa l'id se lo stesso titolo esiste già in libreria */
  const existLib   = await getLibIndex();
  const existEntry = existLib.find(b => b.title === opfTitle);
  currentBookId    = existEntry ? existEntry.id : makeBookId(opfTitle);
  bookmarks        = {};
  fileToChap       = {};

  /* Carica capitoli — solo testo, senza immagini (veloce) */
  chapters     = [];
  chapterWords = [];
  imgDone      = [];

  for (let si = 0; si < spineIds.length; si++) {
    const id   = spineIds[si];
    const info = manifest[id];
    if (!info) continue;
    const { href, mediaType } = info;
    if (mediaType && !mediaType.includes("html") && !mediaType.includes("xhtml") && !mediaType.includes("xml")) continue;

    const fullPath = resolvePath(base, href);
    const chFile   = zipFind(zipRef, fullPath);
    if (!chFile) { log("File non trovato:", fullPath); continue; }

    const doc = parser.parseFromString(await chFile.async("text"), "text/html");
    sanitizeDoc(doc);

    const bodyHtml = doc.body?.innerHTML || "";
    if (!bodyHtml.trim()) continue;

    const words   = countWords(doc.body?.textContent || "");
    const baseDir = fullPath.substring(0, fullPath.lastIndexOf("/") + 1);
    const title   = titleMap[id] || doc.querySelector("h1,h2,h3")?.textContent?.trim()
                 || ("Capitolo " + (chapters.length + 1));

    const ci = chapters.length;
    [href, href.split("/").pop(), fullPath, fullPath.split("/").pop()]
      .forEach(k => { if (k) fileToChap[k] = ci; });

    chapters.push({ title, rawHtml: bodyHtml, html: null, href, baseDir });
    chapterWords.push(words);
    imgDone.push(false);

    if (ci % 5 === 0) { setStatus(`Analisi… ${ci + 1} capitoli`); await yield_(); }
  }

  if (!chapters.length)
    throw new Error("Nessun contenuto HTML nell'EPUB. Il file potrebbe essere protetto o non standard.");

  totalWords = chapterWords.reduce((a, b) => a + b, 0);
  document.getElementById("bookTitle").textContent = opfTitle;

  /* Elabora il capitolo 0 subito (con immagini) */
  await processChapImages(0);
  await saveChap(currentBookId, 0);

  renderToc();
  await show(0);
  hideLoad();
  setStatus("Libro caricato — elaborazione immagini in background…");

  /* Salva metadati e copertina in libreria */
  const libIdx   = await getLibIndex();
  const libPos   = libIdx.findIndex(b => b.id === currentBookId);
  const libEntry = {
    id: currentBookId, title: opfTitle, chapterCount: chapters.length,
    totalWords, date: Date.now(), lastChap: 0, pct: 0, coverDataUrl
  };
  if (libPos >= 0) libIdx[libPos] = libEntry; else libIdx.unshift(libEntry);
  await setLibIndex(libIdx);
  await dbQ("lib_last", currentBookId);

  /* Elabora i capitoli rimanenti in background */
  processBackground(1);
}


/* ═══════════════════════════════════════════════════════════
   LINK INTERNI EPUB — event delegation su #content
   Un solo listener, installato una volta sola.
   ═══════════════════════════════════════════════════════════ */
document.getElementById("content").addEventListener("click", e => {
  const a = e.target.closest("a[href]");
  if (!a) return;
  const href = a.getAttribute("href") || "";
  if (/^https?:\/\/|^mailto:|^tel:/.test(href)) return;

  e.preventDefault();
  const [filePart, anchor] = href.split("#");
  if (filePart) {
    const idx = fileToChap[filePart] ?? fileToChap[filePart.split("/").pop()] ?? -1;
    if (idx >= 0) show(idx, anchor || null);
    else log("Link interno non risolto:", filePart);
  } else if (anchor) {
    scrollToAnchor(anchor);
  }
});

function scrollToAnchor(anchor) {
  if (!anchor) return;
  setTimeout(() => {
    const el = document.getElementById(anchor) || document.querySelector(`[name="${anchor}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    else log("Ancora non trovata:", anchor);
  }, 80);
}


/* ═══════════════════════════════════════════════════════════
   NAVIGAZIONE
   ═══════════════════════════════════════════════════════════ */
async function show(i, anchor) {
  if (i < 0 || i >= chapters.length) return;
  current = i;

  if (!imgDone[i]) {
    setStatus("Elaborazione immagini capitolo…");
    await processChapImages(i);
    await saveChap(currentBookId, i);
  }

  const content = document.getElementById("content");
  content.innerHTML = chapters[i].html || chapters[i].rawHtml || "";
  content.lang      = bookLang;

  /*
    FIX ULTIMO CAPITOLO:
    Salva sempre nella chiave "${id}_last" immediatamente ad ogni cambio capitolo.
    Questa chiave viene letta in loadBook() con priorità su meta.lastChap.
    In questo modo il ripristino è sempre accurato, indipendentemente
    da quando viene chiamata saveBookMeta().
  */
  dbQ(currentBookId + "_last", i);

  ["btnPrevTop","btnPrevBot"].forEach(id => document.getElementById(id).disabled = (i === 0));
  ["btnNextTop","btnNextBot"].forEach(id => document.getElementById(id).disabled = (i === chapters.length - 1));
  document.getElementById("chapterLabel").textContent = `${i + 1} / ${chapters.length}  —  ${chapters[i].title}`;

  document.querySelectorAll(".toc-item").forEach((el, j) => {
    el.classList.toggle("active", j === i);
    el.setAttribute("aria-current", j === i ? "true" : "false");
  });

  applyStyle();
  updateStats();
  updateBmBtn();

  if (anchor) {
    scrollToAnchor(anchor);
  } else {
    const saved = db ? await dbGet(currentBookId + "_scroll_" + i) : null;
    window.scrollTo({ top: saved || 0, behavior: "instant" });
  }

  requestAnimationFrame(setupWordObs);
}

function prev() { if (current > 0) show(current - 1); }
function next() { if (current < chapters.length - 1) show(current + 1); }


/* ═══════════════════════════════════════════════════════════
   SALVATAGGIO SCROLL  (debounced 600ms)
   ═══════════════════════════════════════════════════════════ */
window.addEventListener("scroll", () => {
  if (scrollTimer) clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    if (currentBookId && chapters.length)
      dbQ(currentBookId + "_scroll_" + current, window.scrollY);
  }, 600);
}, { passive: true });


/* ═══════════════════════════════════════════════════════════
   CONTEGGIO PAROLE RIMANENTI — IntersectionObserver con readSet

   COME FUNZIONA (e perché non usa unobserve):

   Ogni elemento testo viene osservato per tutta la vita del capitolo.
   L'observer riceve eventi quando un elemento:
     a) esce dal viewport verso l'alto  → boundingClientRect.top < 0 && !isIntersecting
        → l'elemento è stato letto → lo aggiungiamo a readSet
     b) rientra nel viewport (scroll su) → isIntersecting
        → non ancora letto / di nuovo visibile → lo rimuoviamo da readSet

   "Parole rimanenti" = totalObsWords - Σ(parole degli elementi in readSet)

   Questo approccio gestisce correttamente ENTRAMBE le direzioni di scroll,
   a differenza dell'approccio con unobserve() (che bloccava il decremento
   sullo scroll verso l'alto) usato nella versione precedente.
   ═══════════════════════════════════════════════════════════ */
function setupWordObs() {
  if (wordObs) { wordObs.disconnect(); wordObs = null; }
  readSet.clear();
  totalObsWords = 0;

  const els = [...document.querySelectorAll(
    "#content p, #content li, #content h1, #content h2, #content h3, #content h4, #content blockquote"
  )].filter(el => el.textContent.trim().length > 0);

  if (!els.length) { renderWordCount(chapterWords[current] || 0); return; }

  els.forEach(el => {
    const w = countWords(el.textContent);
    elemWordMap.set(el, w);
    totalObsWords += w;
  });

  wordObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting && entry.boundingClientRect.top < 0) {
        // Elemento uscito verso l'alto → letto
        readSet.add(entry.target);
      } else if (entry.isIntersecting) {
        // Elemento tornato visibile (scroll su) → ancora da leggere
        readSet.delete(entry.target);
      }
    });
    let read = 0;
    readSet.forEach(el => read += elemWordMap.get(el) || 0);
    renderWordCount(Math.max(0, totalObsWords - read));
  }, { threshold: 0 });

  els.forEach(el => wordObs.observe(el));
  renderWordCount(totalObsWords); // stima iniziale
}

/** Aggiorna il contatore con parole rimanenti + stima tempo. */
function renderWordCount(remaining) {
  const el  = document.getElementById("topWordCount");
  if (!chapters.length) { el.textContent = "— p."; el.className = ""; return; }
  const wpm     = 200; // media parole/minuto
  const minutes = Math.ceil(remaining / wpm);
  const time    = remaining === 0 ? "Fine capitolo"
                : minutes <= 1    ? "< 1 min"
                : `~${minutes} min`;
  el.textContent = `${remaining.toLocaleString()} p. · ${time}`;
  el.className   = remaining < 150 ? "near-end" : "";
}


/* ═══════════════════════════════════════════════════════════
   SEGNALIBRI  (per capitolo, non per posizione scroll)
   ═══════════════════════════════════════════════════════════ */
function toggleBookmark() {
  if (!chapters.length) return;
  if (bookmarks[current]) delete bookmarks[current];
  else bookmarks[current] = true;
  updateBmBtn();
  renderToc();
  saveBookMeta().catch(() => {});
}

function updateBmBtn() {
  const marked = !!bookmarks[current] && chapters.length > 0;
  document.getElementById("btnBm").classList.toggle("lit", marked);
  document.getElementById("bmLabel").textContent = marked ? "Segnato" : "Segna";
  document.getElementById("bmIcon").setAttribute("fill", marked ? "currentColor" : "none");
}


/* ═══════════════════════════════════════════════════════════
   STATISTICHE
   ═══════════════════════════════════════════════════════════ */
function updateStats() {
  if (!chapters.length) return;
  let read = 0;
  for (let i = 0; i <= current; i++) read += chapterWords[i] || 0;
  const pct = totalWords ? ((read / totalWords) * 100).toFixed(1) : 0;

  document.getElementById("sChap").textContent  = `${current + 1} / ${chapters.length}`;
  document.getElementById("sChapW").textContent = (chapterWords[current] || 0).toLocaleString();
  document.getElementById("sTot").textContent   =
    `${read.toLocaleString()} / ${totalWords.toLocaleString()} (${pct}%)`;
  document.getElementById("statsRight").textContent =
    `${read.toLocaleString()} / ${totalWords.toLocaleString()} p.`;

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressBar").setAttribute("aria-valuenow", pct);
}


/* ═══════════════════════════════════════════════════════════
   TOC DRAWER
   ═══════════════════════════════════════════════════════════ */
function renderToc() {
  const list = document.getElementById("tocList");
  list.innerHTML = "";
  const all   = tocFilter === "all";
  const items = chapters.map((ch, i) => ({ ch, i })).filter(({ i }) => all || bookmarks[i]);

  if (!items.length) {
    list.innerHTML = `<div class="drawer-empty">${
      all ? "Nessun capitolo"
          : "Nessun segnalibro.<br><small>Usa ★ Segna per segnare un capitolo.</small>"
    }</div>`;
    return;
  }

  items.forEach(({ ch, i }) => {
    const btn     = document.createElement("button");
    btn.className = "toc-item" + (i === current ? " active" : "");
    btn.role      = "listitem";
    btn.setAttribute("aria-current", i === current ? "true" : "false");
    const star    = bookmarks[i] ? `<span class="toc-star" aria-label="segnalibro">★</span>` : "";
    btn.innerHTML = `${star}<span class="toc-title">${ch.title}</span>
                    <span class="toc-words" aria-hidden="true">${(chapterWords[i]||0).toLocaleString()} p.</span>`;
    btn.onclick   = () => { show(i); toggleToc(); };
    list.appendChild(btn);
  });
}

function toggleToc() {
  const d    = document.getElementById("tocDrawer");
  const open = d.classList.toggle("open");
  d.setAttribute("aria-hidden", open ? "false" : "true");
  if (open) { renderToc(); setTimeout(() => d.querySelector(".btn")?.focus(), 50); }
}

function setTocFilter(f) {
  tocFilter = f;
  document.getElementById("tabAll").classList.toggle("on", f === "all");
  document.getElementById("tabBm") .classList.toggle("on", f === "bm");
  document.getElementById("tabAll").setAttribute("aria-selected", f === "all");
  document.getElementById("tabBm") .setAttribute("aria-selected", f === "bm");
  renderToc();
}


/* ═══════════════════════════════════════════════════════════
   LIBRARY DRAWER
   ═══════════════════════════════════════════════════════════ */
async function toggleLibrary() {
  const d    = document.getElementById("libDrawer");
  const open = d.classList.toggle("open");
  d.setAttribute("aria-hidden", open ? "false" : "true");
  if (open) { await renderLibrary(); setTimeout(() => d.querySelector(".btn")?.focus(), 50); }
}


/* ═══════════════════════════════════════════════════════════
   STILE (font size + interlinea)
   ═══════════════════════════════════════════════════════════ */
function applyStyle() {
  const c = document.getElementById("content");
  c.style.fontSize   = fontSize + "px";
  c.style.lineHeight = lineHeight;
}
function changeFont(v) {
  fontSize = Math.max(12, Math.min(36, fontSize + v));
  localStorage.setItem("fs", fontSize);
  applyStyle();
}
function changeLine(v) {
  lineHeight = Math.max(1.2, Math.min(2.8, +(lineHeight + v).toFixed(1)));
  localStorage.setItem("lh", lineHeight);
  applyStyle();
}


/* ═══════════════════════════════════════════════════════════
   STATUS / LOADING
   ═══════════════════════════════════════════════════════════ */
function setStatus(msg) {
  const el   = document.getElementById("statusMsg");
  const spin = el.querySelector(".spinner");
  el.textContent = msg;
  if (spin) el.prepend(spin); // ri-aggiungi lo spinner (textContent lo rimuove)
}
function showLoad(msg) {
  document.getElementById("loadMsg").textContent = msg || "Caricamento…";
  document.getElementById("loadToast").style.display = "flex";
}
function hideLoad() { document.getElementById("loadToast").style.display = "none"; }


/* ═══════════════════════════════════════════════════════════
   RESET UI helper
   ═══════════════════════════════════════════════════════════ */
function resetUI() {
  ["btnPrevTop","btnPrevBot","btnNextTop","btnNextBot"]
    .forEach(id => document.getElementById(id).disabled = true);
  document.getElementById("chapterLabel").textContent = "—";
  document.getElementById("progressFill").style.width = "0%";
  document.getElementById("progressBar").setAttribute("aria-valuenow", "0");
  document.getElementById("statsRight").textContent   = "—";
  document.getElementById("topWordCount").textContent = "— p.";
  document.getElementById("topWordCount").className   = "";
  ["sChap","sChapW","sTot"].forEach(id => document.getElementById(id).textContent = "—");
  updateBmBtn();
  setStatus("Pronto");
}

function emptyStateHTML() {
  return `<div id="emptyState">
    <div class="big" aria-hidden="true">📖</div>
    <div>Apri un file EPUB per iniziare</div>
    <div style="color:var(--border);font-size:10px;margin-top:6px">Salvato localmente · funziona offline</div>
  </div>`;
}


/* ═══════════════════════════════════════════════════════════
   RESET LIBRO CORRENTE
   Non elimina dalla libreria; usa 🗑 in libreria per quello.
   ═══════════════════════════════════════════════════════════ */
async function resetBook() {
  if (!currentBookId && !chapters.length) return;
  if (!confirm("Chiudere il libro corrente?\nRimane salvato in libreria.")) return;

  if (wordObs) { wordObs.disconnect(); wordObs = null; }
  readSet.clear();
  zipRef        = null;
  chapters      = []; chapterWords = []; totalWords = 0;
  current       = 0;  bookmarks    = {}; fileToChap = {};
  currentBookId = null;

  document.getElementById("content").innerHTML = emptyStateHTML();
  document.getElementById("bookTitle").textContent = "Nessun libro caricato";
  document.getElementById("tocList").innerHTML = "";
  resetUI();
}

</script>
</body>
