<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader PRO</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0f0f0f;
  color:#eaeaea;
}

header {
  padding:10px;
  background:#1a1a1a;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

button, input {
  padding:10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

#status, #navInfo {
  padding:6px 12px;
  font-size:14px;
  color:#aaa;
}

#controls {
  padding:8px 12px;
  background:#111;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

#stats {
  font-size:13px;
  color:#8ab4f8;
}

.nav-bar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.nav-bar button {
  font-size:22px;
  padding:14px;
  min-width:80px;
}

#content {
  padding:20px;
  max-width:850px;
  margin:auto;
  line-height:1.8;
  font-size:18px;
}

#index {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-height:60vh;
  overflow:auto;
  background:#111;
  display:none;
  padding:10px;
}

#index button { width:100%; margin:4px 0; }

/* LIBRARY */
#library {
  background:#111;
  padding:10px;
}

#library button {
  width:100%;
  margin:4px 0;
}
</style>
</head>

<body>

<header>
<input type="file" id="fileInput" accept=".epub">
<button onclick="loadBook()">📂</button>
<button onclick="resetBook()">🗑</button>
<button onclick="toggleIndex()">📚</button>
</header>

<div id="status">Pronto</div>
<div id="navInfo"></div>

<div id="controls">
  <div id="stats">0 / 0 • 0%</div>
  <div>
    <button onclick="changeFont(-1)">A-</button>
    <button onclick="changeFont(1)">A+</button>
  </div>
</div>

<div class="nav-bar">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<div id="library"></div>

<main>
<article id="content">Carica un EPUB</article>
</main>

<div class="nav-bar">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<div id="index"></div>

<script>

let db;
let chapters = [];
let current = 0;
let currentBookId = null;

let chapterWords = [];
let totalWords = 0;

// ---------------- UTILS ----------------
function getBookId(file){
  return file.name + "_" + file.size;
}

// ---------------- DB ----------------
function openDB(){
  return new Promise(resolve=>{
    const req = indexedDB.open("EPUB_DB",1);
    req.onupgradeneeded = e=>{
      e.target.result.createObjectStore("store");
    };
    req.onsuccess = e=>{
      db = e.target.result;
      resolve();
    };
  });
}

function dbSet(k,v){
  return new Promise(res=>{
    const tx = db.transaction("store","readwrite");
    tx.objectStore("store").put(v,k);
    tx.oncomplete = res;
  });
}

function dbGet(k){
  return new Promise(res=>{
    const tx = db.transaction("store","readonly");
    const r = tx.objectStore("store").get(k);
    r.onsuccess = ()=>res(r.result);
  });
}

// ---------------- INIT ----------------
(async()=>{
  await openDB();
  renderLibrary();
})();

// ---------------- FILE ----------------
document.getElementById("fileInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;

  currentBookId = getBookId(file);

  const buffer = await file.arrayBuffer();
  process(buffer, file.name);
});

// ---------------- EPUB ----------------
async function process(buffer, name){

  const zip = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  const container = await zip.file("META-INF/container.xml").async("text");
  const rootfile = parser.parseFromString(container,"application/xml")
    .querySelector("rootfile").getAttribute("full-path");

  const opf = parser.parseFromString(await zip.file(rootfile).async("text"),"application/xml");

  const manifest = {};
  opf.querySelectorAll("manifest item").forEach(i=>{
    manifest[i.getAttribute("id")] = i.getAttribute("href");
  });

  const spine = [];
  opf.querySelectorAll("spine itemref").forEach(i=>{
    spine.push(i.getAttribute("idref"));
  });

  const base = rootfile.substring(0, rootfile.lastIndexOf("/") + 1);

  chapters = [];
  chapterWords = [];

  for(const id of spine){

    const file = zip.file(base + manifest[id]);
    if(!file) continue;

    const html = await file.async("text");

    const doc = new DOMParser().parseFromString(html,"text/html");
    const content = doc.body.innerHTML;

    if(content.trim()){
      chapters.push(content);

      const text = doc.body.textContent || "";
      chapterWords.push(text.split(/\s+/).length);
    }
  }

  totalWords = chapterWords.reduce((a,b)=>a+b,0);

  await dbSet("chapters", chapters);
  await dbSet("chapterWords", chapterWords);
  await dbSet("totalWords", totalWords);

  // salva libro
  let books = await dbGet("books") || {};
  books[currentBookId] = {
    name: name,
    lastChapter: 0
  };
  await dbSet("books", books);

  renderLibrary();
  show(0);
}

// ---------------- NAV ----------------
function show(i){
  current = i;
  document.getElementById("content").innerHTML = chapters[i];

  updateStats();

  saveProgress();
}

function saveProgress(){
  dbGet("books").then(books=>{
    if(!books[currentBookId]) return;

    books[currentBookId].lastChapter = current;
    dbSet("books", books);
  });
}

function prev(){ if(current>0) show(current-1); }
function next(){ if(current<chapters.length-1) show(current+1); }

// ---------------- LIBRARY ----------------
async function renderLibrary(){
  const el = document.getElementById("library");
  const books = await dbGet("books") || {};

  el.innerHTML = "<b>Libreria:</b>";

  Object.keys(books).forEach(id=>{
    const b = document.createElement("button");
    b.innerText = books[id].name + " (cap " + (books[id].lastChapter+1) + ")";

    b.onclick = async ()=>{
      currentBookId = id;
      await loadBook();
      show(books[id].lastChapter);
    };

    el.appendChild(b);
  });
}

// ---------------- LOAD ----------------
async function loadBook(){
  const saved = await dbGet("chapters");
  const words = await dbGet("chapterWords");
  const total = await dbGet("totalWords");

  if(!saved) return;

  chapters = saved;
  chapterWords = words;
  totalWords = total;

  renderIndex();
}

// ---------------- STATS ----------------
function updateStats(){
  let read = 0;
  for(let i=0;i<=current;i++) read += chapterWords[i] || 0;

  const percent = totalWords ? ((read/totalWords)*100).toFixed(1) : 0;

  document.getElementById("stats").innerText =
    `${read} / ${totalWords} • ${percent}%`;
}

// ---------------- INDEX ----------------
function renderIndex(){
  const el = document.getElementById("index");
  el.innerHTML = "";

  chapters.forEach((_,i)=>{
    const b = document.createElement("button");
    b.innerText = "Capitolo " + (i+1);
    b.onclick = ()=>{
      show(i);
      toggleIndex();
    };
    el.appendChild(b);
  });
}

function toggleIndex(){
  const el = document.getElementById("index");
  el.style.display = el.style.display==="block" ? "none" : "block";
}

// ---------------- RESET ----------------
async function resetBook(){
  await dbSet("books", {});
  location.reload();
}

</script>

</body>
</html>
