<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:system-ui;
}

/* HEADER */
header {
  display:flex;
  gap:8px;
  padding:10px;
  background:#1a1a1a;
  flex-wrap:wrap;
}

button, input {
  padding:10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

/* CONTROLS */
#controls {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
  flex-wrap:wrap;
}

#stats {
  font-size:14px;
  color:#8ab4f8;
}

/* VIEWER */
#viewer {
  height:70vh;
  width:100%;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.nav button {
  font-size:20px;
  padding:14px;
  min-width:80px;
}

/* INDEX */
#index {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-height:60vh;
  overflow:auto;
  background:#111;
  display:none;
  padding:10px;
}

#index button {
  width:100%;
  margin:4px 0;
}
</style>
</head>

<body>

<header>
<input type="file" id="fileInput" accept=".epub">
<button onclick="toggleIndex()">📚</button>
</header>

<div id="controls">
  <div id="stats">0% • 0 / 0 parole</div>

  <div>
    <button onclick="changeFont(-1)">A-</button>
    <button onclick="changeFont(1)">A+</button>
  </div>
</div>

<div class="nav">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<div id="viewer"></div>

<div class="nav">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<div id="index"></div>

<script>

let book, rendition;
let currentFont = 100;

// progresso
let totalWords = 0;
let spineWords = [];
let locations;
let currentLocation = 0;

// ---------------- LOAD EPUB ----------------
document.getElementById("fileInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);

  book = ePub(url);

  rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%",
    spread: "none"
  });

  await book.ready;

  // genera locations (fondamentale)
  locations = await book.locations.generate(1600);

  await calculateWords();

  rendition.display();

  // restore posizione
  const saved = localStorage.getItem("epub-location");
  if(saved){
    rendition.display(saved);
  }

  // evento cambio pagina
  rendition.on("relocated", loc=>{
    localStorage.setItem("epub-location", loc.start.cfi);

    updateProgress(loc.start.cfi);
  });

  generateTOC();
});

// ---------------- NAV ----------------
function next(){ rendition.next(); }
function prev(){ rendition.prev(); }

// ---------------- FONT ----------------
function changeFont(v){
  currentFont += v * 10;
  rendition.themes.fontSize(currentFont + "%");
}

// ---------------- WORD COUNT ----------------
async function calculateWords(){

  const spine = book.spine.spineItems;

  totalWords = 0;
  spineWords = [];

  for(let item of spine){

    try{
      const doc = await item.load(book.load.bind(book));
      const text = doc.documentElement.textContent || "";

      const words = text.trim().split(/\s+/).filter(w=>w).length;

      spineWords.push(words);
      totalWords += words;

      item.unload();
    }catch(e){
      spineWords.push(0);
    }
  }
}

// ---------------- PROGRESS ----------------
function updateProgress(cfi){

  const percent = book.locations.percentageFromCfi(cfi);
  const progressWords = Math.floor(totalWords * percent);

  document.getElementById("stats").innerText =
    `${(percent*100).toFixed(1)}% • ${progressWords} / ${totalWords} parole`;
}

// ---------------- INDEX ----------------
async function generateTOC(){
  const toc = await book.loaded.navigation;
  const el = document.getElementById("index");
  el.innerHTML = "";

  toc.toc.forEach(ch=>{
    const b = document.createElement("button");
    b.innerText = ch.label;

    b.onclick = ()=>{
      rendition.display(ch.href);
      toggleIndex();
    };

    el.appendChild(b);
  });
}

function toggleIndex(){
  const el = document.getElementById("index");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
