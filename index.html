<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EPUB Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ──────────────────────────────────────────────
   DESIGN TOKENS
   ────────────────────────────────────────────── */
:root {
  --bg:        #0e0d0b;
  --surface:   #161512;
  --surface2:  #1e1c19;
  --border:    #2e2b26;
  --text:      #e8e4dc;
  --muted:     #7a7468;
  --accent:    #c9a84c;
  --accent2:   #8fb07a;
  --danger:    #c0614a;
  --radius:    8px;
  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
  /* Smooth scroll per ancore interne */
  scroll-behavior: smooth;
}

/* Accessibilità: ring visibile con Tab */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius);
}

/* ── TOPBAR ── */
#topbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  padding-left:  calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  white-space: nowrap;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { background: var(--border); border-color: var(--accent); }
.btn.accent { border-color: var(--accent); color: var(--accent); }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: #2a1512; }

@media (max-width: 640px) {
  .btn       { padding: 9px 10px; font-size: 11px; }
  .nav-btn   { padding: 12px 8px; font-size: 11px; }
}

.file-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.file-label:hover { border-color: var(--accent); color: var(--accent); }
input[type="file"] { display: none; }

#bookTitle {
  flex: 1;
  font-family: 'Lora', serif;
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

/* ── STATUS BAR ── */
#statusBar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  padding-left:  calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
#statusMsg { color: var(--accent2); }

#progressBar {
  width: 100%;
  height: 2px;
  background: var(--border);
}
#progressFill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width .4s ease;
}

/* ── CONTROLS ── */
#controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  padding-left:  calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.ctrl-group { display: flex; gap: 6px; flex-wrap: wrap; }
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.stat-label span { color: var(--text); }

/* ── NAV BAR ── */
.nav-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  padding-left:  calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.nav-btn {
  flex: 1;
  max-width: 160px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--border); }
.nav-btn:disabled { opacity: .3; cursor: default; }
#chapterLabel {
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  padding: 0 4px;
}

/* ── CONTENT ── */
#contentWrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  padding-left:  calc(24px + var(--safe-left));
  padding-right: calc(24px + var(--safe-right));
  padding-bottom: calc(80px + var(--safe-bottom));
}
#content {
  font-size: 18px;
  line-height: 1.8;
  color: var(--text);
  /* Skeleton fade-in quando il capitolo viene caricato */
  transition: opacity .15s ease;
}
#content.loading { opacity: .3; pointer-events: none; }

/*
  NON usare !important su color/background:
  Edge Read Aloud inietta span con stili inline per l'evidenziazione;
  !important li renderebbe invisibili.
*/
#content * { max-width: 100%; }

#content p, #content div, #content span,
#content li, #content td, #content th,
#content blockquote, #content cite {
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  background: transparent;
}
#content b, #content strong { font-weight: 600; }
#content i, #content em     { font-style: italic; }

#content img {
  display: block;
  margin: 32px auto;
  border-radius: 4px;
  opacity: .9;
  height: auto;
  /* lazy loading nativo — non blocca il rendering del testo */
  loading: lazy;
}
#content svg {
  display: block;
  margin: 32px auto;
  max-width: 100%;
  height: auto;
}
#content h1, #content h2, #content h3,
#content h4, #content h5, #content h6 {
  font-family: 'Lora', Georgia, serif;
  color: var(--accent);
  background: transparent;
  margin: 2em 0 .6em;
  line-height: 1.3;
}
#content p          { margin-bottom: 1.1em; }
#content ul, #content ol { margin: 1em 0 1em 1.5em; }
#content li         { margin-bottom: .4em; }
#content blockquote {
  margin: 1.5em 0;
  padding: .75em 1em;
  border-left: 3px solid var(--accent);
  color: var(--muted);
}
#content table      { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: .9em; }
#content td, #content th { border: 1px solid var(--border); padding: 8px 12px; }
#content th         { color: var(--accent); background: var(--surface2); }
#content a          { color: var(--accent2); text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color .2s; }
#content a:hover    { text-decoration-color: var(--accent2); }

/* Scroll offset per sticky header + Edge Read Aloud */
html { scroll-padding-top: 140px; }
#content p, #content span, #content div,
#content h1, #content h2, #content h3, #content h4 { scroll-margin-top: 140px; }

/* ── DRAWERS (TOC + LIBRARY) — condivisione stile ── */
/*
  FIX: display:none impedisce le transizioni.
  Usiamo visibility + pointer-events + transition delay.
*/
.drawer {
  position: fixed;
  inset: 0;
  z-index: 300;
  pointer-events: none;
  visibility: hidden;
  transition: visibility 0s linear .3s;
}
.drawer.open {
  pointer-events: all;
  visibility: visible;
  transition: visibility 0s linear 0s;
}
.drawer-backdrop {
  position: absolute;
  inset: 0;
  background: #000000aa;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity .3s ease;
}
.drawer.open .drawer-backdrop { opacity: 1; }

/* ── TOC DRAWER (destra) ── */
#tocPanel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: min(380px, 92vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s ease;
}
#tocDrawer.open #tocPanel { transform: translateX(0); }

.drawer-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
}

/* Tab switcher nel TOC (Indice | Segnalibri) */
.drawer-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-tab {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  -webkit-tap-highlight-color: transparent;
}
.drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
/* Pannello segnalibri: nascosto di default */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.toc-item {
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text);
  font-family: 'Lora', serif;
  font-size: 14px;
  cursor: pointer;
  display: block;
  transition: background .15s;
  border-bottom: 1px solid var(--border);
  -webkit-tap-highlight-color: transparent;
}
.toc-item:hover  { background: var(--surface2); }
.toc-item.active { color: var(--accent); }
.toc-item .toc-words {
  float: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* Segnalibri */
.bookmark-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  border-radius: var(--radius);
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.bookmark-item:hover { background: var(--surface2); }
.bookmark-info { flex: 1; min-width: 0; }
.bookmark-title {
  font-family: 'Lora', serif;
  font-size: 13px;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bookmark-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.bookmark-del {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--danger);
  font-size: 11px;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.bookmark-del:hover { background: #2a1512; }
.empty-tab {
  text-align: center;
  padding: 32px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── LIBRARY DRAWER (sinistra) ── */
#libPanel {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: min(420px, 96vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform .3s ease;
}
#libDrawer.open #libPanel { transform: translateX(0); }

/* Book cards nella libreria */
.book-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.book-card:hover { background: var(--surface2); }
.book-card.current-book { background: #1a1810; border-left: 3px solid var(--accent); }

.book-cover {
  width: 52px;
  height: 72px;
  border-radius: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  overflow: hidden;
}
.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 3px;
}

.book-info {
  flex: 1;
  min-width: 0;
}
.book-card-title {
  font-family: 'Lora', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.book-card-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 8px;
}
.book-card-progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}
.book-card-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}
.book-card-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
}
.book-card-current-badge {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 3px;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  vertical-align: middle;
}

.book-card-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.book-card-actions .btn {
  padding: 5px 10px;
  font-size: 11px;
}

/* ── EMPTY STATE ── */
#emptyState {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  text-align: center;
}
#emptyState .big { font-size: 48px; opacity: .3; }

/* ── LOADING TOAST (angolo, NON copre pulsanti) ── */
#loadingToast {
  display: none;
  position: fixed;
  bottom: 24px;
  right: 24px;
  right: calc(24px + var(--safe-right));
  bottom: calc(24px + var(--safe-bottom));
  z-index: 150;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  box-shadow: 0 4px 20px #0008;
  animation: pulse 1.5s ease infinite;
  min-width: 180px;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Accessibilità: rispetta preferenza riduzione movimento */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: .01ms !important;
    animation-duration: .01ms !important;
  }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════
     TOPBAR
     ═══════════════════════════════ -->
<header id="topbar" role="banner">
  <label class="file-label" for="fileInput" aria-label="Apri file EPUB">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    Apri EPUB
  </label>
  <input type="file" id="fileInput" accept=".epub" aria-label="Seleziona file EPUB">

  <button class="btn" onclick="toggleLib()" aria-label="Apri libreria" aria-haspopup="dialog">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    Libreria
  </button>

  <button class="btn" onclick="toggleToc()" aria-label="Mostra indice" aria-haspopup="dialog">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Indice
  </button>

  <div class="ctrl-group" role="group" aria-label="Controlli testo">
    <button class="btn" onclick="changeFont(-1)" aria-label="Riduci font">A−</button>
    <button class="btn" onclick="changeFont(1)"  aria-label="Aumenta font">A+</button>
    <button class="btn" onclick="changeLine(-0.1)" aria-label="Riduci interlinea">↕−</button>
    <button class="btn" onclick="changeLine(0.1)"  aria-label="Aumenta interlinea">↕+</button>
    <button class="btn" onclick="addBookmark()" aria-label="Aggiungi segnalibro" title="Aggiungi segnalibro">★</button>
  </div>

  <button class="btn danger" onclick="resetCurrentBook()" aria-label="Chiudi libro corrente" title="Chiudi libro corrente">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
  </button>

  <span id="bookTitle" aria-live="polite">Nessun libro caricato</span>

  <span id="topWordCount" aria-live="polite" style="
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    min-width: 140px;
    text-align:right;
  ">— parole rimaste</span>
</header>

<!-- ═══════════════════════════════
     STATUS + PROGRESS
     ═══════════════════════════════ -->
<div id="statusBar" role="status" aria-live="polite">
  <span id="statusMsg">Pronto</span>
  <span id="statsRight">—</span>
</div>
<div id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progresso lettura">
  <div id="progressFill"></div>
</div>

<!-- ═══════════════════════════════
     CONTROLS
     ═══════════════════════════════ -->
<div id="controls">
  <div class="stat-label" aria-live="polite">
    <span>Cap. <span id="sChap">—</span></span>
    <span>Parole cap. <span id="sChapW">—</span></span>
    <span>Totale <span id="sTot">—</span></span>
  </div>
</div>

<!-- ═══════════════════════════════
     NAVIGAZIONE IN ALTO
     ═══════════════════════════════ -->
<nav class="nav-bar" aria-label="Navigazione capitoli (in alto)">
  <button class="nav-btn" id="btnPrevTop" onclick="prev()" disabled aria-label="Capitolo precedente">← Precedente</button>
  <span id="chapterLabel" aria-live="polite">—</span>
  <button class="nav-btn" id="btnNextTop" onclick="next()" disabled aria-label="Capitolo successivo">Successivo →</button>
</nav>

<!-- ═══════════════════════════════
     CONTENUTO
     ═══════════════════════════════ -->
<div id="contentWrap">
  <main id="content" lang="it" role="main" tabindex="-1">
    <div id="emptyState">

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════════ -->
<script>
/* =============================================================
   STATO GLOBALE
   ============================================================= */
let db;
let currentBookId  = null;   // ID del libro aperto ora
let bookMeta       = null;   // { titles[], hrefs[], chapterWords[], totalWords, bookLang, fileToChapter }

/*
  ARCHITETTURA LAZY:
  I capitoli NON sono tenuti tutti in RAM. L'HTML di ogni capitolo
  è caricato dal DB su richiesta e mantenuto in una cache LRU limitata.
  Questo riduce drasticamente il consumo di RAM su libri grandi (>500 pagine).
*/
const CACHE_SIZE   = 5;           // capitoli tenuti in RAM
let chapterCache   = new Map();   // index → html string

let library        = [];          // [{id, title, chaptersCount, totalWords, lastChapter, pct, addedAt, coverDataUrl}]
let current        = 0;
let bookmarks      = {};          // bookId → [{chapterIdx, scrollY, title, date}]

let fontSize   = parseInt(localStorage.getItem("fontSize"))    || 18;
let lineHeight = parseFloat(localStorage.getItem("lineHeight")) || 1.8;

// IntersectionObserver per conteggio parole lette
let ioObserver = null;
let seenWords  = 0;

// RAF handles per throttle
let scrollSaveRaf  = null;

// Debug: attiva con ?debug=1 in URL
const DEBUG = new URLSearchParams(location.search).has("debug");
const log   = DEBUG ? (...a) => console.log("[EPUB]", ...a) : () => {};


/* =============================================================
   INDEXEDDB — versione 4  (multi-libro, capitoli separati)

   Schema delle chiavi:
     "library"               → array metadati libri
     "currentBook"           → id stringa
     "book_{id}_meta"        → { titles[], hrefs[], chapterWords[], totalWords, bookLang, fileToChapter }
     "book_{id}_ch_{i}"      → html string (capitolo i)
     "scroll_{id}_{i}"       → scrollY salvato per capitolo i
     "bookmarks_{id}"        → array segnalibri del libro
   ============================================================= */
function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("EPUB_DB", 4);
    req.onupgradeneeded = e => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains("store"))
        idb.createObjectStore("store");
    };
    req.onsuccess = e => {
      db = e.target.result;
      // Rileva invalidazione DB da altre schede
      db.onversionchange = () => { db.close(); setStatus("DB aggiornato — ricarica la pagina"); };
      resolve();
    };
    req.onerror   = () => reject(new Error("IndexedDB: " + req.error));
    req.onblocked = () => reject(new Error("IndexedDB bloccato — chiudi altre schede"));
  });
}

function dbSet(k, v){
  return new Promise((res, rej) => {
    if (!db) return res();
    try {
      const tx = db.transaction("store", "readwrite");
      tx.objectStore("store").put(v, k);
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    } catch(e){ rej(e); }
  });
}

function dbGet(k){
  return new Promise((res, rej) => {
    if (!db) return res(undefined);
    try {
      const tx  = db.transaction("store", "readonly");
      const req = tx.objectStore("store").get(k);
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    } catch(e){ rej(e); }
  });
}

/** Elimina tutte le chiavi di un libro (meta + tutti i capitoli). */
async function dbDeleteBook(bookId){
  if (!db) return;
  try {
    const meta = await dbGet(`book_${bookId}_meta`);
    const count = meta?.titles?.length || 0;
    const tx = db.transaction("store", "readwrite");
    const store = tx.objectStore("store");
    store.delete(`book_${bookId}_meta`);
    for (let i = 0; i < count; i++){
      store.delete(`book_${bookId}_ch_${i}`);
      store.delete(`scroll_${bookId}_${i}`);
    }
    store.delete(`bookmarks_${bookId}`);
    await new Promise((res, rej) => {
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
    log("Libro eliminato dal DB:", bookId);
  } catch(e){ console.error("dbDeleteBook:", e); }
}

/** Salva il libro corrente, distribuendo i capitoli in chiavi separate. */
async function saveBookToDB(bookId, meta, chaptersHtml, coverDataUrl){
  try {
    // Salva metadati (senza HTML)
    await dbSet(`book_${bookId}_meta`, meta);
    // Salva ogni capitolo separatamente (lazy load)
    for (let i = 0; i < chaptersHtml.length; i++){
      await dbSet(`book_${bookId}_ch_${i}`, chaptersHtml[i]);
    }
    // Aggiorna / crea entry nella libreria
    const existing = library.findIndex(b => b.id === bookId);
    const entry = {
      id:           bookId,
      title:        meta.bookTitle || "Senza titolo",
      chaptersCount: meta.titles.length,
      totalWords:   meta.totalWords,
      lastChapter:  0,
      pct:          0,
      addedAt:      existing >= 0 ? library[existing].addedAt : Date.now(),
      coverDataUrl: coverDataUrl || ""
    };
    if (existing >= 0) library[existing] = entry;
    else library.push(entry);
    await dbSet("library", library);
  } catch(e){
    console.error("saveBookToDB:", e);
    // Quota exceeded o altro: mostra avviso ma non blocca la sessione
    setStatus("⚠️ Spazio DB esaurito — il libro funziona ora ma non sarà salvato");
  }
}


/* =============================================================
   CACHE LRU PER CAPITOLI
   ============================================================= */

/** Carica un capitolo dalla cache o dal DB. */
async function getChapterHtml(i){
  if (chapterCache.has(i)) return chapterCache.get(i);
  const html = await dbGet(`book_${currentBookId}_ch_${i}`);
  if (html === undefined) return "";
  lruSet(i, html);
  return html;
}

function lruSet(i, html){
  // Se già presente, rimuovi per aggiornare l'ordine di inserzione
  if (chapterCache.has(i)) chapterCache.delete(i);
  chapterCache.set(i, html);
  // Eviction: elimina il più vecchio se supera la dimensione massima
  if (chapterCache.size > CACHE_SIZE){
    const oldest = chapterCache.keys().next().value;
    chapterCache.delete(oldest);
    log("Cache eviction capitolo:", oldest);
  }
}

/** Pre-carica i capitoli adiacenti in background (non blocca UI). */
function prefetchAdjacentChapters(i){
  const prefetch = [i - 1, i + 1];
  for (const idx of prefetch){
    if (idx >= 0 && idx < (bookMeta?.titles?.length || 0) && !chapterCache.has(idx)){
      dbGet(`book_${currentBookId}_ch_${idx}`)
        .then(html => { if (html) lruSet(idx, html); })
        .catch(() => {});
    }
  }
}


/* =============================================================
   INIT
   ============================================================= */
(async () => {
  try { await openDB(); }
  catch(e){ setStatus("DB non disponibile: " + e.message); console.error(e); }

  applyStyle();

  // Tastiera ← → / PageUp / PageDown
  document.addEventListener("keydown", e => {
    const tag = document.activeElement?.tagName;
    if (tag === "INPUT" || tag === "BUTTON" || tag === "TEXTAREA") return;
    if (e.key === "ArrowRight" || e.key === "PageDown") { e.preventDefault(); next(); }
    if (e.key === "ArrowLeft"  || e.key === "PageUp")   { e.preventDefault(); prev(); }
  });

  // Carica libreria salvata
  if (!db) return;
  try {
    library       = (await dbGet("library"))      || [];
    currentBookId = (await dbGet("currentBook"))  || null;
    bookmarks     = (await dbGet("bookmarks_all")) || {};

    if (currentBookId){
      const meta = await dbGet(`book_${currentBookId}_meta`);
      if (meta){
        bookMeta = meta;
        const last = (await dbGet(`scroll_meta_${currentBookId}`))?.lastChapter || 0;
        renderToc();
        await show(last);
        document.getElementById("bookTitle").textContent = meta.bookTitle || "—";
        log("Libro ripristinato:", currentBookId, meta.titles.length, "capitoli");
      }
    }
  } catch(e){
    setStatus("Errore ripristino dati: " + e.message);
    console.error(e);
  }
})();


/* =============================================================
   FILE INPUT
   ============================================================= */
document.getElementById("fileInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  showLoading(true, "Analisi EPUB…");

    console.error("[EPUB] processEpub:", err);

/* =============================================================
   LOADING TOAST
   ============================================================= */
function showLoading(visible, msg){
  const el = document.getElementById("loadingToast");
  el.style.display = visible ? "block" : "none";
  if (msg) document.getElementById("loadingMsg").textContent = msg;
}


/* =============================================================
   UTILITÀ PATH E FILE
   ============================================================= */

/**
 * Risolve href relativo rispetto alla directory base del capitolo.
 * Gestisce: ../, ./, assoluti (/), URL http, data:.
 */
function resolvePath(base, href){
  if (!href) return "";
  if (href.startsWith("data:") ||
      href.startsWith("http://") ||
      href.startsWith("https://")) return href;
  if (href.startsWith("/")) return href.slice(1);
  const parts = (base + href).split("/");
  const out   = [];
  for (const p of parts){
    if (p === "..") out.pop();
    else if (p !== ".") out.push(p);
  }
  return out.join("/");
}

/** Cerca file in ZIP in modo case-insensitive. */
function findInsensitive(zip, path){
  const low = path.toLowerCase();
  const key = Object.keys(zip.files).find(k => k.toLowerCase() === low);
  return key ? zip.file(key) : null;
}

/** MIME type da estensione. */
function getMimeType(path){
  const ext = (path.split(".").pop() || "").toLowerCase();
  return {
    jpg:"image/jpeg", jpeg:"image/jpeg", png:"image/png",
    gif:"image/gif",  svg:"image/svg+xml", webp:"image/webp",
    bmp:"image/bmp",  avif:"image/avif"
  }[ext] || "image/octet-stream";
}

/** Conta parole in una stringa di testo. */
function countWords(text){
  return (text || "").replace(/[\r\n\t]+/g, " ").trim()
    .split(/\s+/).filter(w => w.length > 0).length;
}


/* =============================================================
   SANITIZZAZIONE HTML
   Rimuove tag pericolosi e stili che rompono il dark mode,
   preservando grassetto, italico, titoli, tabelle, ecc.
   ============================================================= */
function sanitizeDoc(doc){
  // Tag da rimuovere interamente
  ["script","style","meta","link","iframe","object","embed","form","input","noscript"]
    .forEach(tag => doc.querySelectorAll(tag).forEach(el => el.remove()));

  // Rimuovi event handlers inline e colori EPUB (per dark mode)
  doc.querySelectorAll("*").forEach(el => {
    // Event handlers
    [...el.attributes].filter(a => a.name.startsWith("on"))
      .forEach(a => el.removeAttribute(a.name));

    // Colori e font EPUB che sovrascriverebbero il dark mode
    // NON usiamo !important (compatibilità Edge Read Aloud)
    if (el.style && el.style.length > 0){
      el.style.removeProperty("color");
      el.style.removeProperty("background");
      el.style.removeProperty("background-color");
      el.style.removeProperty("font-family");
      // Tieni font-size, font-weight, font-style (corsivo/grassetto del libro)
    }
  });
}


/* =============================================================
   FIX IMMAGINI  (conversione in data URL base64)
   Supporta: jpg, png, gif, svg, webp, avif.
   Gestisce: path relativi con ../, assoluti, xlink:href SVG.
   Aggiunge loading="lazy" per non bloccare il rendering del testo.
   ============================================================= */
async function fixImages(doc, zip, baseDir){
  const imgEls = [...doc.querySelectorAll("img, image")];
  for (const img of imgEls){
    const isImageTag = img.tagName.toLowerCase() === "image";
    const attr = isImageTag ? "href" : "src";
    let src = img.getAttribute(attr) || img.getAttribute("xlink:href") || "";

    if (!src || src.startsWith("data:") ||
        src.startsWith("http://") || src.startsWith("https://")) continue;

    const resolved = resolvePath(baseDir, src);
    const zipFile  = zip.file(resolved)
                   || zip.file(resolved.replace(/^\//, ""))
                   || findInsensitive(zip, resolved);

    if (!zipFile){ log("Img non trovata:", src, "→", resolved); continue; }

    try {
      // base64 diretto: più veloce di Blob + FileReader
      const b64     = await zipFile.async("base64");
      const mime    = getMimeType(zipFile.name);
      const dataUrl = `data:${mime};base64,${b64}`;

      img.setAttribute(attr, dataUrl);
      if (img.hasAttribute("xlink:href")) img.setAttribute("xlink:href", dataUrl);

      // lazy loading nativo: il browser non scarica l'img fino a che non è visibile
      if (!isImageTag) img.setAttribute("loading", "lazy");

      log("Img convertita:", resolved);
    } catch(e){ log("Img errore:", resolved, e); }
  }
}


/* =============================================================
   TOC PARSING UNIFICATO (EPUB3 nav.xhtml + EPUB2 toc.ncx)
   Restituisce mappa  id → titolo capitolo.
   ============================================================= */
async function parseTocTitles(opf, zip, base, manifest){
  const parser   = new DOMParser();
  const titleMap = {};

  /* ── EPUB3: nav.xhtml ── */
  const navEl = [...opf.getElementsByTagName("item")]
    .find(i => (i.getAttribute("properties") || "").includes("nav")
            || ((i.getAttribute("href") || "").toLowerCase().includes("nav")
               && (i.getAttribute("media-type") || "").includes("html")));

  if (navEl){
    const navPath = resolvePath(base, navEl.getAttribute("href") || "");
    const navFile = zip.file(navPath) || findInsensitive(zip, navPath);
    if (navFile){
      try {
        const navDoc  = parser.parseFromString(await navFile.async("text"), "text/html");
        const navElem = navDoc.querySelector("nav[epub\\:type='toc']") || navDoc.querySelector("nav");
        if (navElem){
          navElem.querySelectorAll("a").forEach(a => {
            const label = a.textContent.trim();
            const href  = (a.getAttribute("href") || "").split("#")[0];
            if (!label || !href) return;
            const plain = href.split("/").pop();
            for (const [id, info] of Object.entries(manifest)){
              if (info.href === href || info.href.split("/").pop() === plain){
                titleMap[id] = label; break;
              }
            }
          });
        }
        if (Object.keys(titleMap).length > 0){
          log("TOC da nav.xhtml:", Object.keys(titleMap).length, "voci");
          return titleMap;
        }
      } catch(e){ log("nav.xhtml error:", e); }
    }
  }

  /* ── EPUB2: toc.ncx ── */
  const ncxEl = [...opf.getElementsByTagName("item")]
    .find(i => (i.getAttribute("media-type") || "").includes("ncx")
            || (i.getAttribute("href") || "").toLowerCase().endsWith(".ncx"));

  if (ncxEl){
    const ncxPath = resolvePath(base, ncxEl.getAttribute("href") || "");
    const ncxFile = zip.file(ncxPath) || findInsensitive(zip, ncxPath);
    if (ncxFile){
      try {
        const ncx = parser.parseFromString(await ncxFile.async("text"), "application/xml");
        ncx.querySelectorAll("navPoint").forEach(np => {
          const label = np.querySelector("navLabel text")?.textContent?.trim();
          const src   = np.querySelector("content")?.getAttribute("src")?.split("#")[0];
          if (!label || !src) return;
          const plain = src.split("/").pop();
          for (const [id, info] of Object.entries(manifest)){
            if (info.href === src || info.href.split("/").pop() === plain){
              titleMap[id] = label; break;
            }
          }
        });
        log("TOC da toc.ncx:", Object.keys(titleMap).length, "voci");
      } catch(e){ log("NCX error:", e); }
    }
  }

  return titleMap;
}


/* =============================================================
   EPUB PARSER PRINCIPALE
   ============================================================= */
async function processEpub(buffer, filename){
  const zip    = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  /* ── container.xml → percorso OPF ── */
  const containerFile = zip.file("META-INF/container.xml")
    || findInsensitive(zip, "META-INF/container.xml");
  if (!containerFile) throw new Error("container.xml non trovato — EPUB non valido");

  const containerXml = parser.parseFromString(
    await containerFile.async("text"), "application/xml");
  const rootPath = containerXml.querySelector("rootfile")?.getAttribute("full-path");
  if (!rootPath) throw new Error("OPF path non trovato");

  const opfFile = zip.file(rootPath) || findInsensitive(zip, rootPath);
  if (!opfFile) throw new Error("OPF non trovato: " + rootPath);

  const opf  = parser.parseFromString(await opfFile.async("text"), "application/xml");
  const base = rootPath.substring(0, rootPath.lastIndexOf("/") + 1); // es. "OEBPS/"
  log("OPF base:", base);

  /* ── Lingua ── */
  const bookLang = opf.querySelector("language")?.textContent?.trim()
                || opf.getElementsByTagName("dc:language")[0]?.textContent?.trim()
                || "it";

  /* ── Titolo libro ── */
  const bookTitleText = opf.querySelector("title")?.textContent?.trim()
                     || opf.getElementsByTagName("dc:title")[0]?.textContent?.trim()
                     || filename.replace(/\.epub$/i, "");

  /* ── Manifest: id → { href, mediaType } ── */
  // getElementsByTagName ignora namespace → robusto su XML non standard
  const manifest = {};
  [...opf.getElementsByTagName("item")].forEach(i => {
    const id   = i.getAttribute("id");
    const href = i.getAttribute("href");
    if (id && href) manifest[id] = { href, mediaType: i.getAttribute("media-type") || "" };
  });
  log("Manifest:", Object.keys(manifest).length, "item");

  /* ── Spine: ordine di lettura ── */
  const spineIds = [...opf.getElementsByTagName("itemref")]
    .map(i => i.getAttribute("idref"))
    .filter(Boolean);
  log("Spine:", spineIds.length, "item");

  /* ── Copertina ── */
  let coverDataUrl = "";
  const coverItem  = [...opf.getElementsByTagName("item")]
    .find(i => (i.getAttribute("properties") || "").includes("cover-image")
            || (i.getAttribute("id") || "").toLowerCase().includes("cover"));
  if (coverItem){
    const coverPath = resolvePath(base, coverItem.getAttribute("href") || "");
    const coverFile = zip.file(coverPath) || findInsensitive(zip, coverPath);
    if (coverFile){
      try {
        const b64     = await coverFile.async("base64");
        const mime    = getMimeType(coverFile.name);
        coverDataUrl  = `data:${mime};base64,${b64}`;
        log("Cover trovata:", coverPath);
      } catch(e){ log("Cover error:", e); }
    }
  }

  /* ── TOC ── */
  showLoading(true, "Lettura indice…");
  const titleMap = await parseTocTitles(opf, zip, base, manifest);

  /* ── Carica capitoli ── */
  showLoading(true, "Caricamento capitoli…");

  const titles       = [];
  const hrefs        = [];
  const chWordsArr   = [];
  const chapHtmlArr  = [];   // HTML temporaneo (non tenuto in memoria dopo il salvataggio)
  const fileToChapter = {};

  for (let idx = 0; idx < spineIds.length; idx++){
    const id   = spineIds[idx];
    const info = manifest[id];
    if (!info){ log("ID non in manifest:", id); continue; }

    const { href, mediaType } = info;

    // Salta item non HTML
    if (mediaType && !mediaType.includes("html") && !mediaType.includes("xml")){
      log("Skip:", href, mediaType); continue;
    }

    const fullPath = resolvePath(base, href);
    const chFile   = zip.file(fullPath) || findInsensitive(zip, fullPath);
    if (!chFile){ log("Capitolo non trovato:", fullPath); continue; }

    showLoading(true, `Caricamento… ${chapHtmlArr.length + 1} cap.`);

    const doc = parser.parseFromString(await chFile.async("text"), "text/html");
    sanitizeDoc(doc);

    // Directory del capitolo per risolvere img path
    const chDir = fullPath.substring(0, fullPath.lastIndexOf("/") + 1);
    await fixImages(doc, zip, chDir);

    const bodyHtml = doc.body?.innerHTML || "";
    if (!bodyHtml.trim()){ log("Capitolo vuoto:", href); continue; }

    const words = countWords(doc.body?.textContent || "");
    const chIdx = chapHtmlArr.length;

    // Titolo: TOC map > primo heading > "Capitolo N"
    const title = titleMap[id]
               || doc.querySelector("h1,h2,h3")?.textContent?.trim()
               || ("Capitolo " + (chIdx + 1));

    // Mappa filename → indice (per link interni)
    fileToChapter[href]                      = chIdx;
    fileToChapter[href.split("/").pop()]     = chIdx;
    fileToChapter[fullPath]                  = chIdx;
    fileToChapter[fullPath.split("/").pop()] = chIdx;

    titles.push(title);
    hrefs.push(href);
    chWordsArr.push(words);
    chapHtmlArr.push(bodyHtml);
  }

  if (!chapHtmlArr.length) throw new Error(
    "Nessun contenuto HTML trovato. Il file potrebbe essere protetto o non standard."
  );

  const totalWords = chWordsArr.reduce((a, b) => a + b, 0);

  /* ── Determina book ID ──
     Se un libro con lo stesso titolo esiste già, lo sovrascrive.
     Altrimenti crea un nuovo ID. */
  const existingIdx = library.findIndex(b => b.title === bookTitleText);
  const bookId = existingIdx >= 0
    ? library[existingIdx].id
    : btoa(unescape(encodeURIComponent(bookTitleText))).replace(/\W/g,"").slice(0,16)
      + "_" + Date.now().toString(36);

  /* ── Salva nel DB ── */
  showLoading(true, "Salvataggio…");
  const meta = { titles, hrefs, chWordsArr, totalWords, bookLang, fileToChapter, bookTitle: bookTitleText };

  // Se sovrascriviamo, elimina prima le chiavi vecchie
  if (existingIdx >= 0) await dbDeleteBook(bookId);

  await saveBookToDB(bookId, meta, chapHtmlArr, coverDataUrl);
  await dbSet("currentBook", bookId);
  await dbSet("scroll_meta_" + bookId, { lastChapter: 0 });

  /* ── Carica nella sessione ── */
  currentBookId = bookId;
  bookMeta      = meta;
  chapterCache.clear();

  // Popola cache per i primi capitoli subito
  chapHtmlArr.slice(0, CACHE_SIZE).forEach((html, i) => lruSet(i, html));

  document.getElementById("bookTitle").textContent = bookTitleText;

  renderToc();
  await show(0);
  setStatus(`Libro caricato — ${titles.length} capitoli, ${totalWords.toLocaleString()} parole`);
}


/* =============================================================
   NAVIGAZIONE
   ============================================================= */

/** Mostra il capitolo i. Se anchor è fornita, scrolla all'elemento. */
async function show(i, anchor){
  if (!bookMeta) return;
  const chapCount = bookMeta.titles.length;
  if (i < 0 || i >= chapCount) return;

  // Salva posizione scroll del capitolo che stiamo lasciando
  if (currentBookId) saveScrollForCurrent();

  current = i;
  const content = document.getElementById("content");

  // Stato di caricamento visivo
  content.classList.add("loading");

  const html = await getChapterHtml(i);
  content.innerHTML = html;
  content.lang      = bookMeta.bookLang || "it";
  content.classList.remove("loading");

  // Salva ultimo capitolo nel DB
  if (currentBookId){
    dbSet(`scroll_meta_${currentBookId}`, { lastChapter: i }).catch(console.warn);
    const libEntry = library.find(b => b.id === currentBookId);
    if (libEntry){
      libEntry.lastChapter = i;
      dbSet("library", library).catch(console.warn);
    }
  }

  // Pulsanti nav
  document.getElementById("btnPrevTop").disabled = (i === 0);
  document.getElementById("btnPrevBot").disabled = (i === 0);
  document.getElementById("btnNextTop").disabled = (i === chapCount - 1);
  document.getElementById("btnNextBot").disabled = (i === chapCount - 1);

  document.getElementById("chapterLabel").textContent =
    `${i + 1} / ${chapCount}  —  ${bookMeta.titles[i]}`;

  document.querySelectorAll(".toc-item").forEach((el, j) =>
    el.classList.toggle("active", j === i));

  applyStyle();
  updateStats();
  // Inizializza IntersectionObserver per il conteggio parole
  setupWordObserver();

  if (anchor){
    scrollToAnchor(anchor);
  } else {
    // Ripristina scroll salvato per questo capitolo
    const saved = await dbGet(`scroll_${currentBookId}_${i}`);
    if (saved && saved > 0){
      requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: "instant" }));
    } else {
      window.scrollTo({ top: 0, behavior: "instant" });
    }
  }

  // Pre-carica i capitoli adiacenti in background
  prefetchAdjacentChapters(i);
}

function prev(){ if (bookMeta && current > 0) show(current - 1); }
function next(){ if (bookMeta && current < bookMeta.titles.length - 1) show(current + 1); }

/** Scrolla a un elemento per id o name (link ancore EPUB). */
function scrollToAnchor(anchor){
  if (!anchor) return;
  setTimeout(() => {
    const el = document.getElementById(anchor)
            || document.querySelector(`[name="${anchor}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    else log("Ancora non trovata:", anchor);
  }, 80);
}


/* =============================================================
   SCROLL SAVE + LINK INTERCEPTION
   ============================================================= */

/** Salva la posizione scroll del capitolo corrente con throttle. */
window.addEventListener("scroll", () => {
  if (scrollSaveRaf) return;
  scrollSaveRaf = requestAnimationFrame(() => {
    saveScrollForCurrent();
    scrollSaveRaf = null;
  });
}, { passive: true });

function saveScrollForCurrent(){
  if (!currentBookId || !bookMeta) return;
  const scrollY = window.scrollY;
  dbSet(`scroll_${currentBookId}_${current}`, scrollY).catch(() => {});
}

/**
 * Intercetta tutti i click su link interni EPUB con event delegation.
 * Risolve href → indice capitolo tramite fileToChapter map.
 * Chiamata una sola volta all'avvio.
 */
document.getElementById("content").addEventListener("click", e => {
  const a = e.target.closest("a[href]");
  if (!a || !bookMeta) return;

  const href = a.getAttribute("href") || "";
  if (href.startsWith("http://") || href.startsWith("https://") ||
      href.startsWith("mailto:") || href.startsWith("tel:")) return;

  e.preventDefault();
  const [filePart, anchor] = href.split("#");

  if (filePart){
    const basename = filePart.split("/").pop();
    const idx = bookMeta.fileToChapter?.[filePart]
             ?? bookMeta.fileToChapter?.[basename]
             ?? -1;
    if (idx >= 0) show(idx, anchor || null);
    else log("Link interno non risolto:", filePart);
  } else if (anchor){
    scrollToAnchor(anchor);
  }
});


/* =============================================================
   STATISTICHE
   ============================================================= */
function updateStats(){
  if (!bookMeta) return;
  const { chWordsArr, totalWords, titles } = bookMeta;
  const chapCount = titles.length;

  let read = 0;
  for (let i = 0; i <= current; i++) read += chWordsArr[i] || 0;
  const pct = totalWords ? ((read / totalWords) * 100).toFixed(1) : 0;

  document.getElementById("sChap").textContent  = `${current + 1} / ${chapCount}`;
  document.getElementById("sChapW").textContent = (chWordsArr[current] || 0).toLocaleString();
  document.getElementById("sTot").textContent   =
    `${read.toLocaleString()} / ${totalWords.toLocaleString()} (${pct}%)`;
  document.getElementById("statsRight").textContent =
    `${read.toLocaleString()} / ${totalWords.toLocaleString()} parole lette`;

  const fill = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  document.getElementById("progressBar").setAttribute("aria-valuenow", pct);

  // Aggiorna progresso nella libreria
  if (currentBookId){
    const entry = library.find(b => b.id === currentBookId);
    if (entry){
      entry.pct = parseFloat(pct);
      entry.lastChapter = current;
      dbSet("library", library).catch(() => {});
    }
  }
}


/* =============================================================
   CONTATORE PAROLE RIMANENTI — IntersectionObserver
   Approccio: ogni paragrafo/heading viene osservato.
   Quando entra nel viewport (anche solo 1px), le sue parole
   vengono aggiunte a seenWords e l'elemento viene rimosso
   dall'observer (non contato due volte).
   Risultato: "parole rimanenti" = totaleCap - seenWords.
   ============================================================= */
function setupWordObserver(){
  // Disconnetti l'observer precedente (capitolo cambiato)
  if (ioObserver){ ioObserver.disconnect(); ioObserver = null; }
  seenWords = 0;
  updateWordDisplay();

  const elements = [...document.querySelectorAll(
    "#content p, #content h1, #content h2, #content h3, #content h4, " +
    "#content li, #content blockquote, #content td"
  )];
  if (!elements.length) return;

  // Pre-calcola parole per ogni elemento
  elements.forEach(el => {
    el.dataset.words = countWords(el.textContent || "");
  });

  ioObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      seenWords += parseInt(entry.target.dataset.words || "0");
      ioObserver.unobserve(entry.target);
    });
    const total = bookMeta?.chWordsArr?.[current] || 0;
    seenWords = Math.min(seenWords, total); // clamp
    updateWordDisplay();
  }, {
    threshold: 0,
    // Considera "letto" anche ciò che è appena uscito dalla parte bassa
    rootMargin: "0px 0px -5% 0px"
  });

  elements.forEach(el => ioObserver.observe(el));
}

function updateWordDisplay(){
  const el    = document.getElementById("topWordCount");
  const total = bookMeta?.chWordsArr?.[current] || 0;
  if (!bookMeta){ el.textContent = "— parole rimaste"; return; }
  const remaining = Math.max(total - seenWords, 0);
  el.textContent  = remaining.toLocaleString() + " parole rimaste";
}


/* =============================================================
   TOC DRAWER
   ============================================================= */
function renderToc(){
  const list = document.getElementById("panelToc");
  if (!list || !bookMeta) return;
  list.innerHTML = "";
  bookMeta.titles.forEach((title, i) => {
    const btn = document.createElement("button");
    btn.className = "toc-item" + (i === current ? " active" : "");
    btn.setAttribute("role", "listitem");
    btn.setAttribute("aria-current", i === current ? "true" : "false");
    btn.innerHTML = `${title}<span class="toc-words" aria-hidden="true">${
      (bookMeta.chWordsArr[i] || 0).toLocaleString()} p.</span>`;
    btn.onclick   = () => { show(i); toggleToc(); };
    list.appendChild(btn);
  });
}

function toggleToc(){
  const d    = document.getElementById("tocDrawer");
  const open = d.classList.toggle("open");
  d.setAttribute("aria-hidden", open ? "false" : "true");
  if (open) setTimeout(() => d.querySelector(".btn")?.focus(), 50);
}

function switchTab(name){
  // Resetta tutti i pannelli e tab
  document.getElementById("panelToc").classList.remove("active");
  document.getElementById("panelBmk").classList.remove("active");
  document.getElementById("tabToc").classList.remove("active");
  document.getElementById("tabBmk").classList.remove("active");
  document.getElementById("tabToc").setAttribute("aria-selected", "false");
  document.getElementById("tabBmk").setAttribute("aria-selected", "false");
  // Attiva quello richiesto
  const panelId = name === "toc" ? "panelToc" : "panelBmk";
  const tabId   = name === "toc" ? "tabToc"   : "tabBmk";
  document.getElementById(panelId).classList.add("active");
  document.getElementById(tabId).classList.add("active");
  document.getElementById(tabId).setAttribute("aria-selected", "true");
  if (name === "bmk") renderBookmarks();
}


/* =============================================================
   SEGNALIBRI
   ============================================================= */

/** Aggiunge un segnalibro alla posizione corrente. */
async function addBookmark(){
  if (!bookMeta || !currentBookId) return;

  const bk = {
    chapterIdx: current,
    scrollY:    window.scrollY,
    title:      bookMeta.titles[current],
    pct:        Math.round((window.scrollY / Math.max(document.body.scrollHeight - window.innerHeight, 1)) * 100),
    date:       new Date().toLocaleDateString("it-IT", { day:"2-digit", month:"short", year:"numeric" })
  };

  if (!bookmarks[currentBookId]) bookmarks[currentBookId] = [];
  bookmarks[currentBookId].push(bk);
  await dbSet("bookmarks_all", bookmarks);

  setStatus("★ Segnalibro aggiunto — " + bk.title);
  // Apri il drawer sulla tab segnalibri
  const d = document.getElementById("tocDrawer");
  if (!d.classList.contains("open")) toggleToc();
  switchTab("bmk");
}

function renderBookmarks(){
  const panel = document.getElementById("panelBmk");
  if (!panel || !currentBookId) return;
  const bks = bookmarks[currentBookId] || [];

  if (!bks.length){
    panel.innerHTML = `<div class="empty-tab">Nessun segnalibro.<br>Usa ★ per aggiungerne uno.</div>`;
    return;
  }

  panel.innerHTML = "";
  bks.forEach((bk, bi) => {
    const item = document.createElement("div");
    item.className = "bookmark-item";
    item.setAttribute("role", "listitem");
    item.innerHTML = `
      <div class="bookmark-info">
        <div class="bookmark-title">${bk.title}</div>
        <div class="bookmark-meta">${bk.date} · ${bk.pct}% nel capitolo</div>
      </div>
      <button class="bookmark-del" aria-label="Elimina segnalibro" onclick="deleteBookmark(${bi}, event)">✕</button>
    `;
    item.onclick = () => { show(bk.chapterIdx); setTimeout(() => window.scrollTo({ top: bk.scrollY, behavior: "smooth" }), 100); toggleToc(); };
    panel.appendChild(item);
  });
}

async function deleteBookmark(bi, e){
  e.stopPropagation();
  if (!bookmarks[currentBookId]) return;
  bookmarks[currentBookId].splice(bi, 1);
  await dbSet("bookmarks_all", bookmarks);
  renderBookmarks();
}


/* =============================================================
   LIBRERIA
   ============================================================= */
function toggleLib(){
  const d    = document.getElementById("libDrawer");
  const open = d.classList.toggle("open");
  d.setAttribute("aria-hidden", open ? "false" : "true");
  if (open){ renderLibrary(); setTimeout(() => d.querySelector(".btn")?.focus(), 50); }
}

function renderLibrary(){
  const list = document.getElementById("libList");
  list.innerHTML = "";

  if (!library.length){
    list.innerHTML = `<div class="empty-tab" style="padding:40px 20px">
      <div style="font-size:36px;opacity:.3;margin-bottom:12px">📚</div>
      Nessun libro salvato.<br>Apri un file EPUB per iniziare.
    </div>`;
    return;
  }

  // Ordina per data aggiunta (più recente prima)
  const sorted = [...library].sort((a, b) => b.addedAt - a.addedAt);

  sorted.forEach(book => {
    const isCurrent = book.id === currentBookId;
    const card = document.createElement("div");
    card.className = "book-card" + (isCurrent ? " current-book" : "");
    card.setAttribute("role", "article");
    card.setAttribute("aria-label", book.title);

    const pct = book.pct || 0;
    const cover = book.coverDataUrl
      ? `<img src="${book.coverDataUrl}" alt="Copertina di ${book.title}" loading="lazy">`
      : `<span aria-hidden="true">${bookCoverEmoji(book.title)}</span>`;

    card.innerHTML = `
      <div class="book-cover">${cover}</div>
      <div class="book-info">
        <div class="book-card-title">
          ${book.title}
          ${isCurrent ? '<span class="book-card-current-badge">IN LETTURA</span>' : ""}
        </div>
        <div class="book-card-meta">
          ${book.chaptersCount} cap. · ${(book.totalWords||0).toLocaleString()} parole
        </div>
        <div class="book-card-progress">
          <div class="book-card-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="book-card-pct">${pct.toFixed(1)}% letto</div>
      </div>
      <div class="book-card-actions">
        <button class="btn accent" onclick="openBook('${book.id}')">Apri</button>
        <button class="btn danger" onclick="deleteBook('${book.id}', event)">Elimina</button>
      </div>
    `;
    list.appendChild(card);
  });
}

/** Emoji copertina deterministica in base al titolo. */
function bookCoverEmoji(title){
  const emojis = ["📖","📗","📘","📙","📕","📚","🔖","✍️","🖊️","📝"];
  let hash = 0;
  for (const ch of title) hash = (hash * 31 + ch.charCodeAt(0)) & 0xFFFFFFFF;
  return emojis[Math.abs(hash) % emojis.length];
}

/** Apre un libro dalla libreria. */
async function openBook(bookId){
  if (bookId === currentBookId){ toggleLib(); return; }

  showLoading(true, "Apertura libro…");
  try {
    const meta = await dbGet(`book_${bookId}_meta`);
    if (!meta) throw new Error("Dati libro non trovati nel DB");

    // Salva posizione libro corrente prima di cambiare
    saveScrollForCurrent();

    currentBookId = bookId;
    bookMeta      = meta;
    chapterCache.clear();

    await dbSet("currentBook", bookId);

    const scrollMeta = await dbGet(`scroll_meta_${bookId}`);
    const lastCh     = scrollMeta?.lastChapter || 0;
    bookmarks        = (await dbGet("bookmarks_all")) || {};

    document.getElementById("bookTitle").textContent = meta.bookTitle || "—";

    renderToc();
    await show(lastCh);
    toggleLib();
  } catch(e){
    setStatus("Errore apertura libro: " + e.message);
    console.error(e);
  } finally {
    showLoading(false);
  }
}

/** Elimina un libro dalla libreria (con conferma). */
async function deleteBook(bookId, e){
  e.stopPropagation();
  const book  = library.find(b => b.id === bookId);
  if (!confirm(`Eliminare "${book?.title || bookId}" dalla libreria?`)) return;

  showLoading(true, "Eliminazione…");
  try {
    await dbDeleteBook(bookId);
    library = library.filter(b => b.id !== bookId);
    await dbSet("library", library);
    delete bookmarks[bookId];
    await dbSet("bookmarks_all", bookmarks);

    if (bookId === currentBookId){
      // Chiudi il libro corrente
      currentBookId = null; bookMeta = null; chapterCache.clear();
      document.getElementById("content").innerHTML = `
        <div id="emptyState">
          <div class="big" aria-hidden="true">📖</div>
          <div>Apri un file EPUB per iniziare</div>
        </div>`;
      document.getElementById("bookTitle").textContent = "Nessun libro caricato";
      document.getElementById("chapterLabel").textContent = "—";
      document.getElementById("progressFill").style.width = "0%";
      ["sChap","sChapW","sTot"].forEach(id => document.getElementById(id).textContent = "—");
      document.getElementById("statsRight").textContent = "—";
      document.getElementById("topWordCount").textContent = "— parole rimaste";
      ["btnPrevTop","btnPrevBot","btnNextTop","btnNextBot"]
        .forEach(id => document.getElementById(id).disabled = true);
      document.getElementById("panelToc").innerHTML = "";
      await dbSet("currentBook", null);
      setStatus("Pronto");
    }
    renderLibrary();
  } catch(e){
    setStatus("Errore eliminazione: " + e.message);
    console.error(e);
  } finally {
    showLoading(false);
  }
}

/* Escape chiude qualsiasi drawer aperto */
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (document.getElementById("tocDrawer").classList.contains("open")) toggleToc();
  if (document.getElementById("libDrawer").classList.contains("open")) toggleLib();
});


/* =============================================================
   RESET LIBRO CORRENTE
   ============================================================= */
async function resetCurrentBook(){
  if (!bookMeta) return;
  if (!confirm("Chiudere il libro corrente? (rimane in libreria)")) return;

  saveScrollForCurrent();
  currentBookId = null; bookMeta = null; chapterCache.clear();

  document.getElementById("content").innerHTML = `
    <div id="emptyState">
      <div class="big" aria-hidden="true">📖</div>
      <div>Apri un file EPUB per iniziare</div>
      <div style="color:var(--border);font-size:10px;margin-top:4px">Usa Libreria per riaprire un libro salvato</div>
    </div>`;
  document.getElementById("bookTitle").textContent  = "Nessun libro caricato";
  document.getElementById("chapterLabel").textContent = "—";
  document.getElementById("progressFill").style.width = "0%";
  document.getElementById("statsRight").textContent   = "—";
  document.getElementById("topWordCount").textContent = "— parole rimaste";
  document.getElementById("panelToc").innerHTML       = "";
  ["sChap","sChapW","sTot"].forEach(id => document.getElementById(id).textContent = "—");
  ["btnPrevTop","btnPrevBot","btnNextTop","btnNextBot"]
    .forEach(id => document.getElementById(id).disabled = true);

  await dbSet("currentBook", null).catch(() => {});
  setStatus("Pronto — usa Libreria per riaprire");
}


/* =============================================================
   STILE (font size, interlinea)
   ============================================================= */
function applyStyle(){
  const c = document.getElementById("content");
  c.style.fontSize   = fontSize + "px";
  c.style.lineHeight = lineHeight;
}
function changeFont(v){
  fontSize = Math.max(12, Math.min(36, fontSize + v));
  localStorage.setItem("fontSize", fontSize);
  applyStyle();
}
function changeLine(v){
  lineHeight = Math.max(1.2, Math.min(2.8, +(lineHeight + v).toFixed(1)));
  localStorage.setItem("lineHeight", lineHeight);
  applyStyle();
}


/* =============================================================
   STATUS
   ============================================================= */
function setStatus(msg){ document.getElementById("statusMsg").textContent = msg; }


/* =============================================================
   SERVICE WORKER  (caching CDN per utilizzo offline)
   ──────────────────────────────────────────────────────────────
   Il SW viene registrato se il browser lo supporta.
   Dopo la prima visita con connessione, JSZip e i font Google
   vengono messi in cache → l'app funziona senza internet.

   NOTA per GitHub Pages: il file sw.js deve essere nella root
   del repository. Includi il file "sw.js" allegato nella root.
   In alternativa, per distribuire tutto in un singolo file HTML,
   commenta questo blocco (le funzionalità core rimangono intatte).
   ============================================================= */
(async () => {
  if (!("serviceWorker" in navigator)) return;
  try {
    await navigator.serviceWorker.register("./sw.js", { scope: "./" });
    log("Service Worker registrato");
  } catch(e){
    log("SW non disponibile (normale in development):", e.message);
  }
})();
