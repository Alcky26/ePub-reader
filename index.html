<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
body { margin:0; font-family:system-ui; background:#0f0f0f; color:#eaeaea; }
header { padding:10px; background:#1a1a1a; display:flex; gap:10px; }
button { padding:10px; border:none; border-radius:6px; background:#333; color:white; }
#content { padding:20px; max-width:800px; margin:auto; line-height:1.8; font-size:18px; }
</style>
</head>

<body>

<header>
<input type="file" id="fileInput" accept=".epub">
<button onclick="loadSaved()">📚 Libro salvato</button>
<button onclick="clearBook()">🗑 Reset</button>
</header>

<main>
<article id="content">Carica un EPUB</article>
</main>

<script>
let chapters = [];
let current = 0;

// SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

// DEBUG (IMPORTANTISSIMO)
function log(msg){
  console.log(msg);
  document.getElementById('content').innerHTML = msg;
}

// FILE LOAD
document.getElementById('fileInput').addEventListener('change', async (e)=>{
  try {
    const file = e.target.files[0];
    if(!file) return;

    log("Caricamento EPUB...");

    const buffer = await file.arrayBuffer();

    localStorage.setItem("epub", JSON.stringify([...new Uint8Array(buffer)]));

    await process(buffer);

  } catch(err){
    console.error(err);
    alert("Errore caricamento EPUB: " + err.message);
  }
});

// PROCESS EPUB
async function process(buffer){

  const zip = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  const containerXml = await zip.file("META-INF/container.xml").async("text");
  const containerDoc = parser.parseFromString(containerXml,"application/xml");

  const rootfile = containerDoc.querySelector("rootfile").getAttribute("full-path");

  const opfText = await zip.file(rootfile).async("text");
  const opfDoc = parser.parseFromString(opfText,"application/xml");

  const manifest = {};
  opfDoc.querySelectorAll("manifest item").forEach(i=>{
    manifest[i.getAttribute("id")] = i.getAttribute("href");
  });

  const spine = [];
  opfDoc.querySelectorAll("spine itemref").forEach(i=>{
    spine.push(i.getAttribute("idref"));
  });

  const base = rootfile.substring(0, rootfile.lastIndexOf("/")+1);

  chapters = [];

  for(const id of spine){
    const path = base + manifest[id];
    const file = zip.file(path);
    if(!file) continue;

    const html = await file.async("text");
    const clean = new DOMParser().parseFromString(html,"text/html").body.innerHTML;

    if(clean.trim()){
      chapters.push(clean);
    }
  }

  localStorage.setItem("chapters", JSON.stringify(chapters));

  show(0);
}

// SHOW
function show(i){
  current = i;
  document.getElementById("content").innerHTML = chapters[i];
  localStorage.setItem("last", i);
}

// LOAD SAVED
function loadSaved(){
  const saved = localStorage.getItem("epub");
  if(!saved) return alert("Nessun libro");

  const bytes = new Uint8Array(JSON.parse(saved));
  process(bytes.buffer);
}

// RESET
function clearBook(){
  localStorage.clear();
  location.reload();
}

// AUTO RESTORE
window.onload = ()=>{
  const savedChapters = localStorage.getItem("chapters");
  if(savedChapters){
    chapters = JSON.parse(savedChapters);
    show(parseInt(localStorage.getItem("last")||0));
  }
}

// NAV
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight" && current < chapters.length-1) show(current+1);
  if(e.key==="ArrowLeft" && current > 0) show(current-1);
});

</script>

</body>
</html>
