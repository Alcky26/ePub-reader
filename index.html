<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0e0d0b;
  --surface:   #161512;
  --surface2:  #1e1c19;
  --border:    #2e2b26;
  --text:      #e8e4dc;
  --muted:     #7a7468;
  --accent:    #c9a84c;
  --accent2:   #8fb07a;
  --danger:    #c0614a;
  --radius:    8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
}

/* ── TOPBAR ── */
#topbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  white-space: nowrap;
}
.btn:hover { background: var(--border); border-color: var(--accent); }
.btn.accent { border-color: var(--accent); color: var(--accent); }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: #2a1512; }

.file-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.file-label:hover { border-color: var(--accent); color: var(--accent); }
input[type="file"] { display: none; }

#bookTitle {
  flex: 1;
  font-family: 'Lora', serif;
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

/* ── STATUS BAR ── */
#statusBar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

#statusMsg { color: var(--accent2); }

#progressBar {
  width: 100%;
  height: 2px;
  background: var(--border);
}
#progressFill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width .4s ease;
}

/* ── CONTROLS ── */
#controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.ctrl-group { display: flex; gap: 6px; }

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 16px;
}
.stat-label span { color: var(--text); }

/* ── NAV BAR ── */
.nav-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

.nav-btn {
  flex: 1;
  max-width: 160px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--border); }
.nav-btn:disabled { opacity: .3; cursor: default; }

#chapterLabel {
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── CONTENT ── */
#contentWrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

#content {
  font-size: 18px;
  line-height: 1.8;
  color: var(--text);
}

/* Sanitize book styles — NO !important su color/background:
   Edge Read Aloud inietta span con stili inline per l'evidenziazione;
   qualsiasi !important su color o background li renderebbe invisibili. */
#content * {
  max-width: 100%;
}

#content p, #content div, #content span,
#content li, #content td, #content th,
#content blockquote, #content cite {
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  background: transparent;
}

#content img {
  display: block;
  margin: 32px auto;
  border-radius: 4px;
  opacity: .9;
}

#content h1, #content h2, #content h3,
#content h4, #content h5, #content h6 {
  font-family: 'Lora', Georgia, serif;
  color: var(--accent);
  background: transparent;
  margin: 2em 0 .6em;
  line-height: 1.3;
}

#content p { margin-bottom: 1.1em; }
#content a { color: var(--accent2); }

/* Compensa l'header sticky quando Edge fa scroll alla parola corrente */
html {
  scroll-padding-top: 120px;
}
#content p, #content span, #content div {
  scroll-margin-top: 120px;
}

/* ── TOC DRAWER ── */
#tocDrawer {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: none;
}
#tocBackdrop {
  position: absolute;
  inset: 0;
  background: #000000aa;
  backdrop-filter: blur(4px);
}
#tocPanel {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(380px, 92vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s ease;
}
#tocDrawer.open { display: block; }
#tocDrawer.open #tocPanel { transform: translateX(0); }

#tocHeader {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

#tocList {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.toc-item {
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text);
  font-family: 'Lora', serif;
  font-size: 14px;
  cursor: pointer;
  display: block;
  transition: background .15s;
  border-bottom: 1px solid var(--border);
}
.toc-item:hover { background: var(--surface2); }
.toc-item.active { color: var(--accent); }
.toc-item .toc-words {
  float: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── EMPTY STATE ── */
#emptyState {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  text-align: center;
}
#emptyState .big { font-size: 48px; opacity: .3; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <label class="file-label" for="fileInput">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Apri EPUB
  </label>
  <input type="file" id="fileInput" accept=".epub">

  <button class="btn" onclick="toggleToc()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Indice
  </button>

  <div class="ctrl-group">
    <button class="btn" onclick="changeFont(-1)" title="Riduci font">A−</button>
    <button class="btn" onclick="changeFont(1)"  title="Aumenta font">A+</button>
    <button class="btn" onclick="changeLine(-0.1)" title="Riduci interlinea">↕−</button>
    <button class="btn" onclick="changeLine(0.1)"  title="Aumenta interlinea">↕+</button>
  </div>

  <button class="btn danger" onclick="resetBook()" title="Cancella libro">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
  </button>

  <span id="bookTitle">Nessun libro caricato</span>

  <span id="topWordCount" style="
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    min-width: 130px;
    text-align:right;
  ">— parole rimaste</span>
</div>

<!-- STATUS BAR -->
<div id="statusBar">
  <span id="statusMsg">Pronto</span>
  <span id="statsRight">—</span>
</div>
<div id="progressBar"><div id="progressFill"></div></div>

<!-- CONTROLS -->
<div id="controls">
  <div class="stat-label">
    <span>Cap. <span id="sChap">—</span></span>
    <span>Parole cap. <span id="sChapW">—</span></span>
    <span>Totale <span id="sTot">—</span></span>
  </div>
</div>

<!-- NAV TOP -->
<div class="nav-bar">
  <button class="nav-btn" id="btnPrevTop" onclick="prev()" disabled>← Precedente</button>
  <span id="chapterLabel">—</span>
  <button class="nav-btn" id="btnNextTop" onclick="next()" disabled>Successivo →</button>
</div>

<!-- CONTENT -->
<div id="contentWrap">
  <article id="content" lang="it">
    <div id="emptyState">
      <div class="big">📖</div>
      <div>Apri un file EPUB per iniziare</div>
      <div style="color:var(--border);font-size:10px">Il libro viene salvato localmente — funziona offline</div>
    </div>
  </article>
</div>

<!-- NAV BOTTOM -->
<div class="nav-bar">
  <button class="nav-btn" id="btnPrevBot" onclick="prev()" disabled>← Precedente</button>
  <span></span>
  <button class="nav-btn" id="btnNextBot" onclick="next()" disabled>Successivo →</button>
</div>

<!-- TOC DRAWER -->
<div id="tocDrawer">
  <div id="tocBackdrop" onclick="toggleToc()"></div>
  <div id="tocPanel">
    <div id="tocHeader">
      <span>INDICE DEI CAPITOLI</span>
      <button class="btn" onclick="toggleToc()">✕</button>
    </div>
    <div id="tocList"></div>
  </div>
</div>


<script>
/* =========================================================
   STATE
   ========================================================= */
let db;
let chapters    = [];   // array di { title, html }
let chapterWords = [];  // parole per capitolo
let totalWords  = 0;
let current     = 0;
let bookLang    = "it";

let fontSize   = parseInt(localStorage.getItem("fontSize"))    || 18;
let lineHeight = parseFloat(localStorage.getItem("lineHeight")) || 1.8;


/* =========================================================
   INDEXEDDB  (semplificata: un libro alla volta)
   ========================================================= */
function openDB(){
  return new Promise(resolve=>{
    const req = indexedDB.open("EPUB_DB", 2);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains("store"))
        db.createObjectStore("store");
    };
    req.onsuccess = e=>{ db = e.target.result; resolve(); };
  });
}
const dbSet  = (k,v)=>new Promise(r=>{ const tx=db.transaction("store","readwrite"); tx.objectStore("store").put(v,k); tx.oncomplete=r; });
const dbGet  = (k)  =>new Promise(r=>{ const tx=db.transaction("store","readonly");  const req=tx.objectStore("store").get(k); req.onsuccess=()=>r(req.result); });
const dbClear= ()   =>new Promise(r=>{ const tx=db.transaction("store","readwrite"); tx.objectStore("store").clear(); tx.oncomplete=r; });


/* =========================================================
   INIT
   ========================================================= */
(async()=>{
  await openDB();
  applyStyle();

  const saved = await dbGet("chapters");
  if(saved && saved.length){
    chapters     = saved;
    chapterWords = await dbGet("chapterWords") || [];
    totalWords   = await dbGet("totalWords")   || 0;
    bookLang     = await dbGet("bookLang")     || "it";
    const last   = await dbGet("last")         || 0;
    renderToc();
    show(last);
  }
})();


/* =========================================================
   FILE INPUT
   ========================================================= */
document.getElementById("fileInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  setStatus("Caricamento…");
  try {
    const buf = await file.arrayBuffer();
    await processEpub(buf, file.name);
  } catch(err){
    setStatus("Errore: " + err.message);
    console.error(err);
  }
  // reset input so same file can be reloaded
  e.target.value = "";
});


/* =========================================================
   IMAGE FIX  (gestisce path relativi, ../ e assoluti)
   ========================================================= */
async function fixImages(doc, zip, base){
  for(const img of doc.querySelectorAll("img, image")){
    const attr = img.tagName === "image" ? "href" : "src";
    let src = img.getAttribute(attr) || img.getAttribute("xlink:href") || "";
    if(!src || src.startsWith("data:") || src.startsWith("http")) continue;

    // risolvi path relativo rispetto alla base
    let path = resolvePath(base, src);
    const file = zip.file(path)
               || zip.file(path.replace(/^\//, ""))
               || findInsensitive(zip, path);
    if(!file) continue;

    try {
      const blob    = await file.async("blob");
      const dataUrl = await blobToDataUrl(blob);
      img.setAttribute(attr, dataUrl);
      if(img.getAttribute("xlink:href")) img.setAttribute("xlink:href", dataUrl);
    } catch(_){}
  }
}

function resolvePath(base, href){
  if(href.startsWith("/")) return href.slice(1);
  let parts = (base + href).split("/");
  const out = [];
  for(const p of parts){
    if(p === "..") out.pop();
    else if(p !== ".") out.push(p);
  }
  return out.join("/");
}

function findInsensitive(zip, path){
  const low = path.toLowerCase();
  const key = Object.keys(zip.files).find(k=>k.toLowerCase()===low);
  return key ? zip.file(key) : null;
}

const blobToDataUrl = blob=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=()=>res(r.result);
  r.onerror=()=>rej(new Error("FileReader failed"));
  r.readAsDataURL(blob);
});


/* =========================================================
   TOC PARSING  (nav.xhtml > toc.ncx > fallback spine numerico)
   ========================================================= */
function parseToc(opf, zip, base){
  const parser = new DOMParser();

  // 1. Cerca nav.xhtml (EPUB3)
  const navItem = [...opf.querySelectorAll("manifest item")]
    .find(i=> i.getAttribute("properties")?.includes("nav")
            || (i.getAttribute("media-type")||"").includes("xhtml")
               && (i.getAttribute("href")||"").toLowerCase().includes("nav"));

  if(navItem){
    const navPath = base + navItem.getAttribute("href");
    const navFile = zip.file(navPath) || findInsensitive(zip, navPath);
    if(navFile){
      try {
        const navDoc = parser.parseFromString(
          zip.files[navFile.name]?._data || "", "text/html");
        // non usiamo async qui — restituiamo i titoli dai toc item
        // (viene chiamato in modo sincrono dall'ePub già in RAM)
        const navText = navFile.name; // segnaposto; vedi sotto
      } catch(_){}
    }
  }

  // 2. Cerca toc.ncx (EPUB2)
  const ncxItem = [...opf.querySelectorAll("manifest item")]
    .find(i=>(i.getAttribute("media-type")||"").includes("ncx")
           || (i.getAttribute("href")||"").toLowerCase().endsWith(".ncx"));

  if(ncxItem){
    const ncxPath = base + ncxItem.getAttribute("href");
    const ncxFile = zip.file(ncxPath) || findInsensitive(zip, ncxPath);
    if(ncxFile) return { type:"ncx", file: ncxFile };
  }

  return null;
}

async function buildTitleMap(tocInfo, zip, spineIds, manifest, base){
  // Mappa idref → titolo
  const map = {};
  if(!tocInfo) return map;
  const parser = new DOMParser();

  if(tocInfo.type === "ncx"){
    const text = await tocInfo.file.async("text");
    const ncx  = parser.parseFromString(text, "application/xml");
    ncx.querySelectorAll("navPoint").forEach(np=>{
      const label = np.querySelector("navLabel text")?.textContent?.trim();
      const src   = np.querySelector("content")?.getAttribute("src")?.split("#")[0];
      if(label && src){
        // associa il src al corrispondente idref nello spine
        const href = src.split("/").pop();
        const id   = Object.entries(manifest).find(([,v])=>v.split("/").pop()===href)?.[0];
        if(id) map[id] = label;
      }
    });
  }

  // nav.xhtml
  if(tocInfo.type === "nav"){
    const text  = await tocInfo.file.async("text");
    const navDoc = parser.parseFromString(text, "text/html");
    navDoc.querySelectorAll("nav[epub\\:type='toc'] a, nav a").forEach(a=>{
      const label = a.textContent.trim();
      const href  = a.getAttribute("href")?.split("#")[0];
      if(label && href){
        const plain = href.split("/").pop();
        const id = Object.entries(manifest).find(([,v])=>v.split("/").pop()===plain)?.[0];
        if(id) map[id] = label;
      }
    });
  }

  return map;
}


/* =========================================================
   EPUB PARSER
   ========================================================= */
async function processEpub(buffer, filename){
  const zip    = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  // container.xml → OPF path
  const containerFile = zip.file("META-INF/container.xml")
    || findInsensitive(zip, "META-INF/container.xml");
  if(!containerFile) throw new Error("container.xml non trovato");

  const containerXml = parser.parseFromString(
    await containerFile.async("text"), "application/xml");
  const rootPath = containerXml.querySelector("rootfile")?.getAttribute("full-path");
  if(!rootPath) throw new Error("OPF path non trovato");

  const opfFile = zip.file(rootPath) || findInsensitive(zip, rootPath);
  if(!opfFile) throw new Error("OPF non trovato: " + rootPath);

  const opf  = parser.parseFromString(await opfFile.async("text"), "application/xml");
  const base = rootPath.substring(0, rootPath.lastIndexOf("/") + 1);

  // lingua del libro
  bookLang = opf.querySelector("language")?.textContent?.trim() || "it";

  // manifest
  const manifest = {};
  opf.querySelectorAll("manifest item").forEach(i=>{
    manifest[i.getAttribute("id")] = i.getAttribute("href");
  });

  // spine
  const spineIds = [];
  opf.querySelectorAll("spine itemref").forEach(i=>{
    spineIds.push(i.getAttribute("idref"));
  });

  // TOC
  const tocInfo  = parseToc(opf, zip, base);

  // correggi parseToc per nav
  const navItem2 = [...opf.querySelectorAll("manifest item")]
    .find(i=> i.getAttribute("properties")?.includes("nav"));
  let tocInfoFinal = tocInfo;
  if(!tocInfoFinal && navItem2){
    const navPath = base + navItem2.getAttribute("href");
    const nf = zip.file(navPath) || findInsensitive(zip, navPath);
    if(nf) tocInfoFinal = { type:"nav", file: nf };
  }

  const titleMap = await buildTitleMap(tocInfoFinal, zip, spineIds, manifest, base);

  // carica capitoli
  chapters     = [];
  chapterWords = [];

  for(let idx=0; idx<spineIds.length; idx++){
    const id   = spineIds[idx];
    const href = manifest[id];
    if(!href) continue;

    const chFile = zip.file(base + href) || findInsensitive(zip, base + href);
    if(!chFile) continue;

    const html  = await chFile.async("text");
    const doc   = parser.parseFromString(html, "text/html");

    await fixImages(doc, zip, base + href.substring(0, href.lastIndexOf("/")+1));

    const bodyHtml = doc.body?.innerHTML || "";
    if(!bodyHtml.trim()) continue;

    const words = (doc.body?.textContent || "").split(/\s+/).filter(Boolean).length;

    // titolo: da TOC map, oppure primo h1/h2/h3, oppure "Capitolo N"
    const titleFromDoc = doc.querySelector("h1,h2,h3")?.textContent?.trim();
    const title = titleMap[id]
               || titleFromDoc
               || ("Capitolo " + (chapters.length + 1));

    chapters.push({ title, html: bodyHtml });
    chapterWords.push(words);

    setStatus(`Caricamento… ${chapters.length} capitoli`);
  }

  if(!chapters.length) throw new Error("Nessun contenuto trovato nell'EPUB");

  totalWords = chapterWords.reduce((a,b)=>a+b,0);

  // salva (sovrascrive sempre)
  await dbClear();
  await dbSet("chapters",     chapters);
  await dbSet("chapterWords", chapterWords);
  await dbSet("totalWords",   totalWords);
  await dbSet("bookLang",     bookLang);
  await dbSet("last",         0);

  // titolo libro
  const opfTitle = opf.querySelector("title")?.textContent?.trim();
  document.getElementById("bookTitle").textContent =
    opfTitle || filename.replace(".epub","");

  renderToc();
  show(0);
  setStatus("Libro caricato — " + chapters.length + " capitoli");
}


/* =========================================================
   NAVIGATION
   ========================================================= */
function show(i){
  if(i < 0 || i >= chapters.length) return;
  current = i;

  const content = document.getElementById("content");
  content.innerHTML = chapters[i].html;
  content.lang      = bookLang;

  dbSet("last", i);

  // nav buttons
  document.getElementById("btnPrevTop").disabled = (i === 0);
  document.getElementById("btnPrevBot").disabled = (i === 0);
  document.getElementById("btnNextTop").disabled = (i === chapters.length-1);
  document.getElementById("btnNextBot").disabled = (i === chapters.length-1);

  document.getElementById("chapterLabel").textContent =
    (i+1) + " / " + chapters.length + "  —  " + chapters[i].title;

  // active toc item
  document.querySelectorAll(".toc-item").forEach((el,j)=>{
    el.classList.toggle("active", j===i);
  });

  applyStyle();
  updateStats();
  updateWordCount();
  window.scrollTo({top:0});
}

function prev(){ show(current - 1); }
function next(){ show(current + 1); }


/* =========================================================
   STATS
   ========================================================= */
function updateStats(){
  if(!chapters.length) return;

  let read = 0;
  for(let i=0;i<=current;i++) read += chapterWords[i]||0;
  const pct = totalWords ? ((read/totalWords)*100).toFixed(1) : 0;

  document.getElementById("sChap").textContent   = (current+1) + " / " + chapters.length;
  document.getElementById("sChapW").textContent  = (chapterWords[current]||0).toLocaleString();
  document.getElementById("sTot").textContent    = read.toLocaleString() + " / " + totalWords.toLocaleString() + " (" + pct + "%)";

  document.getElementById("statsRight").textContent =
    read.toLocaleString() + " / " + totalWords.toLocaleString() + " parole lette";

  document.getElementById("progressFill").style.width = pct + "%";
}


/* =========================================================
   WORD COUNTER IN TOPBAR (aggiornato sullo scroll)
   ========================================================= */
window.addEventListener("scroll", updateWordCount);

function updateWordCount(){
  const el  = document.getElementById("topWordCount");
  const doc = document.documentElement;
  const st  = doc.scrollTop || document.body.scrollTop;
  const sh  = doc.scrollHeight - doc.clientHeight;
  const prog = sh > 0 ? st / sh : 0;

  const total     = chapterWords[current] || 0;
  const remaining = Math.max(Math.floor(total * (1 - prog)), 0);

  if(!chapters.length){
    el.textContent = "— parole rimaste";
    return;
  }
  el.textContent = remaining.toLocaleString() + " parole rimaste";
}


/* =========================================================
   TOC DRAWER
   ========================================================= */
function renderToc(){
  const list = document.getElementById("tocList");
  list.innerHTML = "";
  chapters.forEach((ch,i)=>{
    const btn = document.createElement("button");
    btn.className = "toc-item" + (i===current?" active":"");
    btn.innerHTML = `${ch.title}<span class="toc-words">${(chapterWords[i]||0).toLocaleString()} p.</span>`;
    btn.onclick = ()=>{ show(i); toggleToc(); };
    list.appendChild(btn);
  });
}

function toggleToc(){
  const d = document.getElementById("tocDrawer");
  d.classList.toggle("open");
}


/* =========================================================
   STYLE
   ========================================================= */
function applyStyle(){
  const c = document.getElementById("content");
  c.style.fontSize   = fontSize + "px";
  c.style.lineHeight = lineHeight;
}
function changeFont(v){ fontSize = Math.max(12, Math.min(32, fontSize+v)); localStorage.setItem("fontSize",fontSize); applyStyle(); }
function changeLine(v){ lineHeight = Math.max(1.2, Math.min(2.8, +(lineHeight+v).toFixed(1))); localStorage.setItem("lineHeight",lineHeight); applyStyle(); }


/* =========================================================
   STATUS
   ========================================================= */
function setStatus(msg){ document.getElementById("statusMsg").textContent = msg; }


/* =========================================================
   RESET
   ========================================================= */
async function resetBook(){
  if(!confirm("Cancellare il libro salvato?")) return;
  await dbClear();
  chapters = []; chapterWords = []; totalWords = 0; current = 0;
  document.getElementById("content").innerHTML = `
    <div id="emptyState">
      <div class="big">📖</div>
      <div>Apri un file EPUB per iniziare</div>
    </div>`;
  document.getElementById("bookTitle").textContent = "Nessun libro caricato";
  document.getElementById("tocList").innerHTML = "";
  document.getElementById("chapterLabel").textContent = "—";
  document.getElementById("progressFill").style.width = "0%";
  document.getElementById("statsRight").textContent = "—";
  ["sChap","sChapW","sTot"].forEach(id=>document.getElementById(id).textContent="—");
  ["btnPrevTop","btnPrevBot","btnNextTop","btnNextBot"]
    .forEach(id=>document.getElementById(id).disabled=true);
  setStatus("Pronto");
}
</script>
