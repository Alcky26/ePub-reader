<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader PRO</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eaeaea;
}

header {
  padding:10px;
  background:#1a1a1a;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

button, input {
  padding:10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

button { cursor:pointer; }

#status {
  padding:8px 12px;
  font-size:13px;
  color:#8ab4f8;
}

#navInfo {
  padding:5px 12px;
  font-size:14px;
  color:#ccc;
}

#content {
  padding:20px;
  max-width:850px;
  margin:auto;
  line-height:1.8;
  font-size:18px;
}

#index {
  padding:10px;
  border-top:1px solid #333;
}

#index button {
  width:100%;
  margin:4px 0;
  text-align:left;
}
</style>
</head>

<body>

<header>
<input type="file" id="fileInput" accept=".epub">

<button onclick="prev()"></button>
<button onclick="next()"></button>
<button onclick="toggleIndex()"> Indice</button>
<button onclick="loadBook()"> Riapri libro</button>
<button onclick="resetBook()"> Reset</button>
</header>

<div id="status">Pronto.</div>
<div id="navInfo"></div>

<main>
<article id="content">Carica un EPUB</article>
<div id="index" style="display:none;"></div>
</main>

<script>

let db;
let chapters = [];
let current = 0;

// ---------------- DB ----------------
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open("EPUB_DB",1);

    req.onupgradeneeded = e=>{
      const db = e.target.result;
      db.createObjectStore("store");
    };

    req.onsuccess = e=>{
      db = e.target.result;
      resolve(db);
    };

    req.onerror = ()=>reject();
  });
}

function dbSet(key,val){
  return new Promise((resolve)=>{
    const tx = db.transaction("store","readwrite");
    tx.objectStore("store").put(val,key);
    tx.oncomplete = ()=>resolve();
  });
}

function dbGet(key){
  return new Promise((resolve)=>{
    const tx = db.transaction("store","readonly");
    const req = tx.objectStore("store").get(key);
    req.onsuccess = ()=>resolve(req.result);
  });
}

function dbClear(){
  return new Promise((resolve)=>{
    const tx = db.transaction("store","readwrite");
    tx.objectStore("store").clear();
    tx.oncomplete = ()=>resolve();
  });
}

// ---------------- STATUS ----------------
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

// ---------------- INIT ----------------
(async()=>{
  await openDB();
  setStatus("Sistema pronto");

  const saved = await dbGet("chapters");
  if(saved){
    chapters = saved;
    const last = await dbGet("last") || 0;
    setStatus("Libro caricato da memoria");
    show(last);
  }
})();

// ---------------- EPUB ----------------
document.getElementById("fileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  setStatus(" Lettura EPUB...");

  const buffer = await file.arrayBuffer();
  process(buffer);
});

async function process(buffer){

  setStatus(" Parsing EPUB...");

  const zip = await JSZip.loadAsync(buffer);
  const parser = new DOMParser();

  const containerXml = await zip.file("META-INF/container.xml").async("text");
  const containerDoc = parser.parseFromString(containerXml,"application/xml");

  const rootfile = containerDoc.querySelector("rootfile").getAttribute("full-path");

  const opfText = await zip.file(rootfile).async("text");
  const opfDoc = parser.parseFromString(opfText,"application/xml");

  const manifest = {};
  opfDoc.querySelectorAll("manifest item").forEach(i=>{
    manifest[i.getAttribute("id")] = i.getAttribute("href");
  });

  const spine = [];
  opfDoc.querySelectorAll("spine itemref").forEach(i=>{
    spine.push(i.getAttribute("idref"));
  });

  const base = rootfile.substring(0, rootfile.lastIndexOf("/") + 1);

  chapters = [];

  setStatus(" Generazione capitoli...");

  for(const id of spine){
    const path = base + manifest[id];
    const file = zip.file(path);
    if(!file) continue;

    const html = await file.async("text");
    const clean = new DOMParser().parseFromString(html,"text/html").body.innerHTML;

    if(clean.trim()) chapters.push(clean);
  }

  await dbSet("chapters", chapters);
  await dbSet("last", 0);

  setStatus(" Libro caricato ("+chapters.length+" capitoli)");

  renderIndex();
  show(0);
}

// ---------------- SHOW ----------------
function show(i){
  current = i;
  document.getElementById("content").innerHTML = chapters[i];
  dbSet("last", i);
  updateNav();
}

// ---------------- NAV ----------------
function prev(){
  if(current > 0) show(current - 1);
}

function next(){
  if(current < chapters.length - 1) show(current + 1);
}

function updateNav(){
  document.getElementById("navInfo").innerText =
    "Capitolo " + (current + 1) + " / " + chapters.length;
}

// ---------------- INDEX ----------------
function renderIndex(){
  const el = document.getElementById("index");
  el.innerHTML = "";

  chapters.forEach((_,i)=>{
    const btn = document.createElement("button");
    btn.innerText = "Capitolo " + (i+1);
    btn.onclick = ()=> {
      show(i);
      toggleIndex();
    };
    el.appendChild(btn);
  });
}

function toggleIndex(){
  const el = document.getElementById("index");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

// ---------------- LOAD / RESET ----------------
async function loadBook(){
  const saved = await dbGet("chapters");
  const last = await dbGet("last");

  if(!saved) return setStatus("Nessun libro salvato");

  chapters = saved;
  setStatus("Libro caricato da memoria");

  renderIndex();
  show(last || 0);
}

async function resetBook(){
  await dbClear();
  chapters = [];
  document.getElementById("content").innerHTML = "Reset completato";
  setStatus("Memoria pulita");
  document.getElementById("navInfo").innerText = "";
}

// ---------------- KEY NAV ----------------
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});

</script>

</body>
</html>
